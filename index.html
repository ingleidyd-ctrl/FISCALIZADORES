<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FISCALIZADORES</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="FISCALIZADORES">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --texto: #f8fafc;
            --texto-sec: #94a3b8; --accent: #38bdf8; --borde: #334155;
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --card: #ffffff; --texto: #1e293b;
            --texto-sec: #64748b; --accent: #0284c7; --borde: #e2e8f0;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: var(--bg); color: var(--texto); line-height: 1.6; 
            overflow-x: hidden; width: 100%; position: relative;
            touch-action: pan-x pan-y; /* Bloquea zoom en el body */
        }

        /* OVERLAY CORREGIDO PARA PERMITIR ZOOM */
        #imgOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; justify-content: center; 
            align-items: center; z-index: 5000;
            overflow: auto; /* Permite desplazamiento si la foto es grande */
            touch-action: pinch-zoom; /* HABILITA EL ZOOM AQUÍ */
        }
        #imgOverlay img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            transition: transform 0.2s ease;
        }

        .flag-img { width: 60px; height: auto; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        #vistaLogin {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 20px;
        }
        .login-card {
            background: var(--card); padding: 40px; border-radius: 24px;
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid var(--borde);
        }

        input, select, textarea { 
            font-size: 16px !important; 
            background: var(--card);
            border: 1px solid var(--borde);
            color: var(--texto);
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            outline: none;
        }
        
        header { 
            background: var(--card); padding: 0.8rem 2rem; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--borde); position: sticky; top: 0; z-index: 1000; 
        }
        .logo-container { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .app-logo { height: 45px; width: auto; border-radius: 8px; }
        .logo-text { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; }

        .theme-toggle { background: var(--bg); border: 1px solid var(--borde); color: var(--texto); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: 600; }

        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; user-select: none; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; user-select: none; }
        .btn-danger { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; width: 100%; }

        .grid-main { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px 40px; }
        .card-folder { background: var(--card); padding: 25px; border-radius: 18px; border: 1px solid var(--borde); text-align: center; cursor: pointer; position: relative; }
        .folder-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 15px; }
        
        .cv-container { max-width: 800px; margin: 20px auto; background: var(--card); border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); margin-bottom: 50px; }
        .cv-banner { background: #0284c7; padding: 40px 20px; text-align: center; color: white; position: relative; }
        .cv-photo { width: 160px; height: 160px; border-radius: 50%; border: 4px solid white; object-fit: cover; margin-bottom: 20px; cursor: zoom-in; }

        .cv-content { display: grid; grid-template-columns: 1fr 1.5fr; gap: 0; }
        .cv-left { background: rgba(0,0,0,0.05); padding: 40px; border-right: 1px solid var(--borde); }
        .cv-right { padding: 40px; }

        .info-group { margin-bottom: 20px; }
        .info-label { font-size: 0.85rem; color: var(--texto-sec); display: block; margin-bottom: 5px; }
        .info-value { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .historial-box { white-space: pre-line; color: var(--texto-sec); font-size: 1rem; margin-bottom: 30px; }

        @media (max-width: 768px) { .cv-content { grid-template-columns: 1fr; } .grid-main { padding: 20px; } }
        #mainHeader, #vistaDashboard, #vistaCV, #vistaEditor { display: none; }
    </style>
</head>
<body>

    <div id="vistaLogin">
        <div class="login-card">
            <img src="logo.png" style="height: 70px; margin-bottom: 15px; border-radius: 12px;">
            <h2 style="margin-bottom: 5px; font-weight: 800;">FISCALIZADORES</h2>
            <div style="text-align: left; margin-bottom: 15px;">
                <label class="info-label">Email de acceso</label>
                <input type="email" id="loginEmail">
            </div>
            <div style="text-align: left; margin-bottom: 25px;">
                <label class="info-label">Contraseña</label>
                <input type="password" id="loginPass">
            </div>
            <button class="btn-primary" style="width: 100%;" onclick="login()">INGRESAR</button>
            <p id="loginError" style="color: #ff4444; margin-top: 15px;"></p>
        </div>
    </div>

    <header id="mainHeader">
        <div class="logo-container" onclick="location.reload()">
            <img src="logo.png" class="app-logo">
            <span class="logo-text">FISCALIZADORES</span>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
            <button onclick="logout()" style="background:none; border:none; color:#ff4444; font-weight:bold; cursor:pointer;">SALIR</button>
        </div>
    </header>

    <!-- VISOR DE FOTOS CON BOTÓN CERRAR PARA EVITAR CONFLICTO CON ZOOM -->
    <div id="imgOverlay">
        <button onclick="cerrarFoto()" style="position: fixed; top: 20px; right: 20px; background: white; border: none; padding: 10px 15px; border-radius: 50%; font-weight: bold; z-index: 6000;">X</button>
        <img id="imgFull">
    </div>

    <div id="vistaDashboard">
        <div style="padding: 20px 40px; display: flex; gap: 15px;">
            <input type="text" id="busqueda" placeholder="Buscar..." style="flex:1" onkeyup="buscador()">
            <button class="btn-primary" onclick="abrirEditor()">+ NUEVO</button>
        </div>
        <div id="gridMain" class="grid-main"></div>
    </div>

    <div id="vistaCV">
        <div style="padding: 20px 40px;"><button class="btn-outline" onclick="irDashboard()">← VOLVER</button></div>
        <div id="cvContent" class="cv-container"></div>
    </div>

    <div id="vistaEditor">
        <div style="max-width: 850px; margin: 30px auto; background: var(--card); padding: 40px; border-radius: 20px;">
            <h2 id="tituloEditor">Registro</h2>
            <div style="text-align: center; margin: 20px 0;">
                <img id="prevFoto" style="width:120px; height:120px; border-radius:50%; object-fit:cover;">
                <input type="file" id="fileIn" onchange="subirFoto(this)" style="display:none" accept="image/*">
                <button class="btn-outline" style="display:block; margin: 10px auto;" onclick="document.getElementById('fileIn').click()">Cambiar Foto</button>
            </div>
            <!-- Los mismos inputs de tu código original... -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="text" id="inNom" placeholder="Nombre">
                <input type="text" id="inCong" placeholder="Congregación">
                <select id="inNacIo" onchange="actualizarProvinciasEditor()"><option value="🇦🇷">🇦🇷 Argentina</option><option value="🇵🇾">🇵🇾 Paraguay</option><option value="🇧🇷">🇧🇷 Brasil</option></select>
                <select id="inCiu"><option value="">Ciudad</option></select>
                <textarea id="inHist" placeholder="Historial" style="grid-column: span 2;"></textarea>
            </div>
            <button class="btn-primary" style="width:100%; margin-top:20px;" onclick="guardar()">GUARDAR</button>
        </div>
    </div>

    <script>
        // Configuración Firebase (La tuya original)
        const firebaseConfig = {
            apiKey: "AIzaSyBkP6NALOTSHGd4QVgAxHyeJzCCnOUDY6M",
            authDomain: "fiscalizadores-elite.firebaseapp.com",
            projectId: "fiscalizadores-elite",
            storageBucket: "fiscalizadores-elite.firebasestorage.app",
            messagingSenderId: "482161512140",
            appId: "1:482161512140:web:95dd229a858ab627a03c69"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let miembros = [];
        let fotoURL = "";
        let idEdit = null;

        // FUNCIONES DE ZOOM
        function abrirZoomFoto(src) {
            if(!src || src.includes('placeholder')) return;
            document.getElementById('imgFull').src = src;
            document.getElementById('imgOverlay').style.display = 'flex';
            // Al abrir la foto quitamos el bloqueo de zoom preventivamente
            document.body.style.overflow = 'hidden';
        }

        function cerrarFoto() {
            document.getElementById('imgOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // LÓGICA DE USUARIOS
        function login() {
            const email = document.getElementById('loginEmail').value.toLowerCase().trim();
            const pass = document.getElementById('loginPass').value.trim();
            if (email === "admi@com" && pass === "admigeneral.26") {
                localStorage.setItem('fisc_session', 'active');
                mostrarSistema();
            }
        }

        function mostrarSistema() {
            document.getElementById('vistaLogin').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'flex';
            irDashboard();
        }

        function irDashboard() { 
            document.getElementById('vistaDashboard').style.display = 'block'; 
            document.getElementById('vistaCV').style.display = 'none'; 
            document.getElementById('vistaEditor').style.display = 'none'; 
            escuchar(); 
        }

        function escuchar() {
            db.collection("curriculums").onSnapshot(snap => {
                miembros = [];
                snap.forEach(doc => miembros.push({ id: doc.id, ...doc.data() }));
                renderCiudades();
            });
        }

        function renderCiudades() {
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            const ciudades = [...new Set(miembros.map(m => m.ciudad))];
            ciudades.forEach(c => {
                grid.innerHTML += `<div class="card-folder" onclick="verMiembros('${c}')"><h3>${c}</h3></div>`;
            });
        }

        function verMiembros(c) {
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            miembros.filter(m => m.ciudad === c).forEach(m => {
                grid.innerHTML += `<div class="card-folder" onclick="verCV('${m.id}')">
                    <img src="${m.foto || ''}" style="width:60px; height:60px; border-radius:50%; object-fit:cover;">
                    <h3>${m.nombre}</h3>
                </div>`;
            });
        }

        function verCV(id) {
            const m = miembros.find(x => x.id === id);
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'block';
            document.getElementById('cvContent').innerHTML = `
                <div class="cv-banner">
                    <img src="${m.foto}" class="cv-photo" onclick="abrirZoomFoto(this.src)">
                    <div style="font-size:1.5rem; font-weight:800;">${m.nombre}</div>
                    <p>${m.cong} - ${m.ciudad}</p>
                </div>
                <div class="cv-right" style="padding:20px;">
                    <div class="historial-box">${m.hist || 'Sin historial'}</div>
                    <button class="btn-primary" onclick="abrirEditor('${m.id}')">EDITAR</button>
                </div>`;
        }

        function abrirEditor(id = null) {
            idEdit = id;
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'none'; 
            document.getElementById('vistaEditor').style.display = 'block';
        }

        async function guardar() {
            const d = {
                nombre: document.getElementById('inNom').value,
                ciudad: document.getElementById('inCiu').value,
                cong: document.getElementById('inCong').value,
                hist: document.getElementById('inHist').value,
                foto: fotoURL
            };
            if(idEdit) await db.collection("curriculums").doc(idEdit).update(d);
            else await db.collection("curriculums").add(d);
            irDashboard();
        }

        function subirFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { fotoURL = e.target.result; document.getElementById('prevFoto').src = fotoURL; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        window.onload = () => { if(localStorage.getItem('fisc_session')) mostrarSistema(); };
    </script>
</body>
</html>
