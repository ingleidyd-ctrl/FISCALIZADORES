<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FISCALIZADORES</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --texto: #f8fafc;
            --texto-sec: #94a3b8; --accent: #38bdf8; --borde: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background-color: var(--bg); color: var(--texto);
            overflow-x: hidden; width: 100%;
            /* Bloqueamos el zoom en el cuerpo principal */
            touch-action: pan-x pan-y; 
        }

        /* --- VISOR DE FOTO CON ZOOM HABILITADO --- */
        #imgOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); display: none; justify-content: center; 
            align-items: center; z-index: 9999;
            /* Aquí permitimos que el navegador use gestos de zoom */
            touch-action: pinch-zoom; 
            overflow: auto;
        }

        #imgFull { 
            max-width: 100%; 
            transition: transform 0.1s ease-out;
            cursor: zoom-in;
        }

        .btn-cerrar-zoom {
            position: fixed; top: 30px; right: 20px;
            background: white; color: black; border: none;
            width: 40px; height: 40px; border-radius: 50%;
            font-weight: bold; font-size: 20px; z-index: 10000;
        }

        /* --- RESTO DE ESTILOS IGUALES --- */
        .cv-photo { width: 160px; height: 160px; border-radius: 50%; border: 4px solid white; object-fit: cover; cursor: pointer; }
        .grid-main { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card-folder { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; }
        header { background: var(--card); padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 700; }
        #vistaDashboard, #vistaCV, #vistaEditor { display: none; }
    </style>
</head>
<body>

    <header id="mainHeader" style="display:none;">
        <span style="font-weight:800;">FISCALIZADORES</span>
        <button onclick="logout()" style="color:#ff4444; background:none; border:none; font-weight:bold;">SALIR</button>
    </header>

    <!-- VISOR ESPECIAL PARA HACER ZOOM -->
    <div id="imgOverlay">
        <button class="btn-cerrar-zoom" onclick="cerrarZoom()">×</button>
        <img id="imgFull" alt="Foto de perfil">
    </div>

    <!-- VISTA LOGIN (Simplificada para el ejemplo) -->
    <div id="vistaLogin" style="height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div style="background:var(--card); padding:30px; border-radius:20px; width:100%; max-width:350px; text-align:center;">
            <h2>INGRESAR</h2><br>
            <input type="password" id="pass" placeholder="Contraseña" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none;">
            <button class="btn-primary" style="width:100%" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <!-- VISTAS DE LA APP -->
    <div id="vistaDashboard">
        <div class="grid-main" id="gridMain"></div>
    </div>

    <div id="vistaCV">
        <div style="padding:20px;"><button onclick="irDashboard()" style="color:var(--accent); background:none; border:none;">← Volver</button></div>
        <div id="cvContent" style="text-align:center;"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBkP6NALOTSHGd4QVgAxHyeJzCCnOUDY6M",
            authDomain: "fiscalizadores-elite.firebaseapp.com",
            projectId: "fiscalizadores-elite",
            storageBucket: "fiscalizadores-elite.firebasestorage.app",
            messagingSenderId: "482161512140",
            appId: "1:482161512140:web:95dd229a858ab627a03c69"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let miembros = [];

        // LÓGICA DE ZOOM TÁCTIL
        function abrirZoom(src) {
            const overlay = document.getElementById('imgOverlay');
            const img = document.getElementById('imgFull');
            img.src = src;
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Evita scroll de fondo
        }

        function cerrarZoom() {
            document.getElementById('imgOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // CONTROL DE NAVEGACIÓN
        function login() {
            if(document.getElementById('pass').value === "admigeneral.26") {
                localStorage.setItem('auth', 'true');
                mostrarApp();
            }
        }

        function logout() { localStorage.clear(); location.reload(); }

        function mostrarApp() {
            document.getElementById('vistaLogin').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'flex';
            irDashboard();
        }

        function irDashboard() {
            document.getElementById('vistaDashboard').style.display = 'block';
            document.getElementById('vistaCV').style.display = 'none';
            escucharDatos();
        }

        function escucharDatos() {
            db.collection("curriculums").onSnapshot(snap => {
                miembros = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                const grid = document.getElementById('gridMain');
                grid.innerHTML = "";
                miembros.forEach(m => {
                    grid.innerHTML += `
                        <div class="card-folder" onclick="verCV('${m.id}')">
                            <img src="${m.foto}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; margin-bottom:10px;">
                            <h4>${m.nombre}</h4>
                        </div>`;
                });
            });
        }

        function verCV(id) {
            const m = miembros.find(x => x.id === id);
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'block';
            document.getElementById('cvContent').innerHTML = `
                <img src="${m.foto}" class="cv-photo" onclick="abrirZoom(this.src)">
                <h2 style="margin-top:15px;">${m.nombre}</h2>
                <p style="color:var(--accent)">${m.cong}</p>
                <div style="padding:30px; text-align:left; color:var(--texto-sec);">${m.hist || 'Sin historial'}</div>
            `;
        }

        window.onload = () => { if(localStorage.getItem('auth')) mostrarApp(); };
    </script>
</body>
</html>
