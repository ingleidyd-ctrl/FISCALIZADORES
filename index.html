<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <!-- El viewport bloquea el zoom general para que la app sea estable -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FISCALIZADORES</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="FISCALIZADORES">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --texto: #f8fafc;
            --texto-sec: #94a3b8; --accent: #38bdf8; --borde: #334155;
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --card: #ffffff; --texto: #1e293b;
            --texto-sec: #64748b; --accent: #0284c7; --borde: #e2e8f0;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: var(--bg); color: var(--texto); line-height: 1.6; 
            overflow-x: hidden; width: 100%; position: relative;
            touch-action: pan-x pan-y; /* Bloquea zoom en el cuerpo */
        }

        /* --- VISOR DE FOTOS CON ZOOM HABILITADO --- */
        #imgOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; justify-content: center; 
            align-items: center; z-index: 5000;
            /* Esta línea permite el zoom con los dedos en este elemento */
            touch-action: pinch-zoom; 
            overflow: auto;
        }
        #imgOverlay img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            /* Quitamos la transición de 0.3s solo para la imagen del zoom para que no se sienta pesada al ampliar */
            transition: none; 
        }

        .flag-img { width: 60px; height: auto; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        #vistaLogin {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 20px;
        }
        .login-card {
            background: var(--card); padding: 40px; border-radius: 24px;
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid var(--borde);
        }

        input, select, textarea { 
            font-size: 16px !important; 
            background: var(--card); border: 1px solid var(--borde); color: var(--texto);
            padding: 12px; border-radius: 10px; width: 100%; outline: none;
        }

        header { 
            background: var(--card); padding: 0.8rem 2rem; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--borde); position: sticky; top: 0; z-index: 1000; 
        }
        .logo-container { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .app-logo { height: 45px; width: auto; border-radius: 8px; }
        .logo-text { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; }

        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }

        .grid-main { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px 40px; }
        .card-folder { background: var(--card); padding: 25px; border-radius: 18px; border: 1px solid var(--borde); text-align: center; cursor: pointer; position: relative; }
        .folder-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 15px; }
        
        .cv-container { max-width: 800px; margin: 20px auto; background: var(--card); border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .cv-banner { background: #0284c7; padding: 40px 20px; text-align: center; color: white; }
        .cv-photo { width: 160px; height: 160px; border-radius: 50%; border: 4px solid white; object-fit: cover; margin-bottom: 20px; cursor: zoom-in; }

        .historial-box { white-space: pre-line; color: var(--texto-sec); font-size: 1rem; margin-bottom: 30px; }

        @media (max-width: 768px) { .grid-main { padding: 20px; } }
        #mainHeader, #vistaDashboard, #vistaCV, #vistaEditor { display: none; }
    </style>
</head>
<body>

    <div id="vistaLogin">
        <div class="login-card">
            <img src="logo.png" style="height: 70px; margin-bottom: 15px;">
            <h2>FISCALIZADORES</h2><br>
            <input type="password" id="loginPass" placeholder="Contraseña">
            <button class="btn-primary" style="width: 100%; margin-top: 15px;" onclick="login()">INGRESAR</button>
        </div>
    </div>

    <header id="mainHeader">
        <div class="logo-container" onclick="location.reload()">
            <img src="logo.png" class="app-logo">
            <span class="logo-text">FISCALIZADORES</span>
        </div>
        <button onclick="logout()" style="background:none; border:none; color:#ff4444; font-weight:bold;">SALIR</button>
    </header>

    <!-- VISOR DE FOTOS: Aquí se puede hacer zoom -->
    <div id="imgOverlay" onclick="this.style.display='none'">
        <img id="imgFull">
    </div>

    <div id="vistaDashboard">
        <div style="padding: 20px 40px;"><input type="text" id="busqueda" placeholder="Buscar..." onkeyup="buscador()"></div>
        <div id="gridMain" class="grid-main"></div>
    </div>

    <div id="vistaCV">
        <div style="padding: 20px 40px;"><button class="btn-outline" onclick="irDashboard()">← VOLVER</button></div>
        <div id="cvContent" class="cv-container"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBkP6NALOTSHGd4QVgAxHyeJzCCnOUDY6M",
            authDomain: "fiscalizadores-elite.firebaseapp.com",
            projectId: "fiscalizadores-elite",
            storageBucket: "fiscalizadores-elite.firebasestorage.app",
            messagingSenderId: "482161512140",
            appId: "1:482161512140:web:95dd229a858ab627a03c69"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let miembros = [];

        function login() {
            if (document.getElementById('loginPass').value === "admigeneral.26") {
                localStorage.setItem('auth', 'true');
                mostrarSistema();
            }
        }

        function logout() { localStorage.clear(); location.reload(); }

        function mostrarSistema() {
            document.getElementById('vistaLogin').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'flex';
            irDashboard();
        }

        function irDashboard() { 
            document.getElementById('vistaDashboard').style.display = 'block'; 
            document.getElementById('vistaCV').style.display = 'none'; 
            escuchar(); 
        }

        function escuchar() {
            db.collection("curriculums").onSnapshot(snap => {
                miembros = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderCiudades();
            });
        }

        function renderCiudades() {
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            const ciudades = [...new Set(miembros.map(m => m.ciudad))];
            ciudades.forEach(c => {
                grid.innerHTML += `<div class="card-folder" onclick="verMiembros('${c}')"><h3>${c}</h3></div>`;
            });
        }

        function verMiembros(c) {
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            miembros.filter(m => m.ciudad === c).forEach(m => {
                grid.innerHTML += `<div class="card-folder" onclick="verCV('${m.id}')">
                    <img src="${m.foto}" style="width:70px; height:70px; border-radius:50%; object-fit:cover;">
                    <h3>${m.nombre}</h3>
                </div>`;
            });
        }

        function verCV(id) {
            const m = miembros.find(x => x.id === id);
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'block';
            document.getElementById('cvContent').innerHTML = `
                <div class="cv-banner">
                    <img src="${m.foto}" class="cv-photo" onclick="abrirZoom(this.src)">
                    <h2>${m.nombre}</h2>
                    <p>${m.cong}</p>
                </div>
                <div style="padding:40px;">
                    <div class="historial-box">${m.hist || 'Sin historial'}</div>
                </div>`;
        }

        // --- FUNCIÓN DE ZOOM MEJORADA ---
        function abrirZoom(src) {
            const overlay = document.getElementById('imgOverlay');
            const img = document.getElementById('imgFull');
            img.src = src;
            overlay.style.display = 'flex';
            // Al abrir, el body no debe moverse para que el zoom sea fluido
            document.body.style.overflow = 'hidden';
        }

        // Al cerrar el visor devolvemos el scroll al body
        document.getElementById('imgOverlay').addEventListener('click', function() {
            document.body.style.overflow = 'auto';
        });

        window.onload = () => { if(localStorage.getItem('auth')) mostrarSistema(); };
    </script>
</body>
</html>
