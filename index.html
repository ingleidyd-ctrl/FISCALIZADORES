<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA FISCALIZADORES</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --texto: #f8fafc;
            --texto-sec: #94a3b8; --accent: #38bdf8; --borde: #334155;
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --card: #ffffff; --texto: #1e293b;
            --texto-sec: #64748b; --accent: #0284c7; --borde: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg); color: var(--texto); }

        header { background: var(--card); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--borde); position: sticky; top: 0; z-index: 1000; }
        .theme-toggle { background: var(--bg); border: 1px solid var(--borde); color: var(--texto); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: 600; }

        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-bottom: 10px; }

        .grid-main { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .card-folder { background: var(--card); padding: 30px; border-radius: 18px; border: 1px solid var(--borde); text-align: center; cursor: pointer; transition: 0.3s; }
        .card-folder:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-img-circle { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 15px; cursor: zoom-in; }

        .img-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; cursor: zoom-out; }
        .img-overlay img { max-width: 90%; max-height: 90%; border-radius: 10px; }

        .cv-container { max-width: 950px; margin: 30px auto; background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid var(--borde); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .cv-header { background: var(--accent); padding: 50px 20px; text-align: center; color: white; }
        .cv-photo-main { width: 150px; height: 150px; border-radius: 50%; border: 5px solid white; object-fit: cover; background: white; margin-bottom: 15px; cursor: zoom-in; }
        .cv-grid { display: grid; grid-template-columns: 300px 1fr; }
        .cv-side { padding: 30px; background: rgba(0,0,0,0.02); border-right: 1px solid var(--borde); }
        .cv-body { padding: 40px; }

        .section-title { font-size: 0.8rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; border-bottom: 1px solid var(--borde); padding-bottom: 5px; }
        .data-label { font-size: 0.75rem; color: var(--texto-sec); font-weight: 600; display: block; }
        .data-value { font-size: 1rem; font-weight: 500; margin-bottom: 15px; display: block; }

        .editor-box { max-width: 850px; margin: 30px auto; background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--borde); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--borde); background: var(--bg); color: var(--texto); }

        @media (max-width: 768px) { .cv-grid { grid-template-columns: 1fr; } .form-grid { grid-template-columns: 1fr; } }
        #vistaDashboard, #vistaCV, #vistaEditor { display: none; }
    </style>
</head>
<body>

    <div id="imgOverlay" class="img-overlay" onclick="cerrarFoto()"><img id="imgFull" src=""></div>

    <header>
        <h2 style="font-weight: 800; cursor: pointer;" onclick="location.reload()">FISCALIZADORES<span style="color:var(--accent)">.</span></h2>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Modo Oscuro</button>
    </header>

    <div id="vistaDashboard">
        <div style="padding: 20px 40px; display: flex; gap: 15px; align-items: center;">
            <input type="text" id="busqueda" placeholder="Buscar por nombre, ciudad o congregación..." style="flex:1; padding: 12px; border-radius: 10px; border: 1px solid var(--borde); background: var(--card); color: var(--texto);" onkeyup="buscador()">
            <button class="btn-primary" onclick="abrirEditor()">+ NUEVO REGISTRO</button>
        </div>
        <div style="padding: 0 40px 40px;">
            <button id="btnBack" class="btn-outline" onclick="volverAtras()" style="display:none;">← VOLVER</button>
            <h3 id="tituloTxt" style="margin: 10px 0 25px; font-weight: 800;">Listado de Ciudades</h3>
            <div id="gridMain" class="grid-main"></div>
        </div>
    </div>

    <div id="vistaCV">
        <div style="padding: 20px 40px;"><button class="btn-outline" onclick="irDashboard()">← VOLVER AL LISTADO</button></div>
        <div id="cvContent" class="cv-container"></div>
    </div>

    <div id="vistaEditor">
        <div class="editor-box">
            <h2 style="margin-bottom: 25px;">Editar Información</h2>
            <div style="text-align: center; margin-bottom: 30px;">
                <img id="prevFoto" src="https://via.placeholder.com/120" style="width:120px; height:120px; border-radius:50%; object-fit:cover; border: 3px solid var(--accent);">
                <input type="file" id="fileIn" onchange="subirFoto(this)" style="display:none">
                <button class="btn-outline" style="display:block; margin: 15px auto;" onclick="document.getElementById('fileIn').click()">Cambiar Foto</button>
            </div>
            <div class="form-grid">
                <div><label class="data-label">Nombre Completo</label><input type="text" id="inNom"></div>
                <div><label class="data-label">N° de Documento</label><input type="text" id="inDoc"></div>
                <div><label class="data-label">Nacionalidad (País)</label>
                    <select id="inNacIo">
                        <option value="🇵🇾">🇵🇾 Paraguay</option>
                        <option value="🇦🇷">🇦🇷 Argentina</option>
                        <option value="🇧🇷">🇧🇷 Brasil</option>
                        <option value="🇺🇾">🇺🇾 Uruguay</option>
                        <option value="🇧🇴">🇧🇴 Bolivia</option>
                        <option value="🇨🇱">🇨🇱 Chile</option>
                        <option value="🇵🇪">🇵🇪 Perú</option>
                        <option value="🇨🇴">🇨🇴 Colombia</option>
                        <option value="🇪🇨">🇪🇨 Ecuador</option>
                        <option value="🇻🇪">🇻🇪 Venezuela</option>
                        <option value="🇲🇽">🇲🇽 México</option>
                        <option value="🇪🇸">🇪🇸 España</option>
                        <option value="🇺🇸">🇺🇸 EE.UU.</option>
                    </select>
                </div>
                <div><label class="data-label">Edad Actual</label><input type="text" id="inEdad"></div>
                <div><label class="data-label">WhatsApp</label><input type="text" id="inTel"></div>
                <div><label class="data-label">Ciudad</label><input type="text" id="inCiu"></div>
                <div><label class="data-label">Congregación</label><input type="text" id="inCong"></div>
                <div><label class="data-label">Estado Civil</label><input type="text" id="inEstCiv"></div>
                <div><label class="data-label">Ocupación Espiritual</label><input type="text" id="inOcuEsp"></div>
                <div><label class="data-label">Ocupación Material</label><input type="text" id="inOcuMat"></div>
                <div><label class="data-label">Años Perseverancia</label><input type="number" id="inAnos"></div>
                <div><label class="data-label">Estado Actual</label><input type="text" id="inEstAct"></div>
                <div style="grid-column: span 2;"><label class="data-label">Fiscalizador de:</label><input type="text" id="inFisc"></div>
                <div style="grid-column: span 2;"><label class="data-label">Historial de Vida</label><textarea id="inHist" rows="5"></textarea></div>
            </div>
            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button class="btn-primary" style="flex:2" onclick="guardar()">GUARDAR REGISTRO</button>
                <button class="btn-outline" style="flex:1" onclick="irDashboard()">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBkP6NALOTSHGd4QVgAxHyeJzCCnOUDY6M",
            authDomain: "fiscalizadores-elite.firebaseapp.com",
            projectId: "fiscalizadores-elite",
            storageBucket: "fiscalizadores-elite.firebasestorage.app",
            messagingSenderId: "482161512140",
            appId: "1:482161512140:web:95dd229a858ab627a03c69"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let miembros = [];
        let fotoURL = "";
        let idEdit = null;
        let nivel = "ciudades";
        let ciuSel = "";

        function ampliarFoto(src) { if(src && !src.includes('placeholder')) { document.getElementById('imgFull').src = src; document.getElementById('imgOverlay').style.display = 'flex'; } }
        function cerrarFoto() { document.getElementById('imgOverlay').style.display = 'none'; }

        function toggleTheme() {
            const body = document.documentElement;
            const tema = body.getAttribute("data-theme") === "light" ? "dark" : "light";
            body.setAttribute("data-theme", tema);
            document.getElementById('themeBtn').innerText = tema === "light" ? "☀️ Modo Claro" : "🌙 Modo Oscuro";
            localStorage.setItem("theme", tema);
        }

        if(localStorage.getItem("theme") === "light") { document.documentElement.setAttribute("data-theme", "light"); document.getElementById('themeBtn').innerText = "☀️ Modo Claro"; }

        function irDashboard() { document.getElementById('vistaDashboard').style.display = 'block'; document.getElementById('vistaCV').style.display = 'none'; document.getElementById('vistaEditor').style.display = 'none'; escuchar(); }

        function escuchar() {
            db.collection("curriculums").onSnapshot(snap => {
                miembros = [];
                snap.forEach(doc => miembros.push({ id: doc.id, ...doc.data() }));
                if(nivel === "ciudades") renderCiudades();
            });
        }

        function buscador() {
            const txt = document.getElementById('busqueda').value.toLowerCase();
            const grid = document.getElementById('gridMain');
            if (txt.length > 0) {
                nivel = "busqueda"; document.getElementById('btnBack').style.display = 'inline-block';
                document.getElementById('tituloTxt').innerText = "Resultados";
                grid.innerHTML = "";
                miembros.filter(m => (m.nombre && m.nombre.toLowerCase().includes(txt)) || (m.ciudad && m.ciudad.toLowerCase().includes(txt)) || (m.cong && m.cong.toLowerCase().includes(txt))).forEach(m => {
                    grid.innerHTML += `<div class="card-folder">
                        <img src="${m.foto || 'https://via.placeholder.com/80'}" class="card-img-circle" onclick="ampliarFoto(this.src)">
                        <div onclick="verCV('${m.id}')"><h3>${m.nombre} ${m.nacionalidad && m.nacionalidad !== "undefined" ? m.nacionalidad : ''}</h3></div>
                    </div>`;
                });
            } else { renderCiudades(); }
        }

        function renderCiudades() {
            nivel = "ciudades"; 
            document.getElementById('btnBack').style.display = 'none';
            document.getElementById('tituloTxt').innerText = "Listado de Ciudades";
            const grid = document.getElementById('gridMain'); 
            grid.innerHTML = "";
            
            const ciudadesUnicas = [...new Set(miembros.map(m => m.ciudad))];
            
            ciudadesUnicas.forEach(c => {
                const primerMiembro = miembros.find(m => m.ciudad === c);
                let iconoAMostrar = "📍";
                if (primerMiembro && primerMiembro.nacionalidad && primerMiembro.nacionalidad !== "undefined") {
                    iconoAMostrar = primerMiembro.nacionalidad;
                }
                
                grid.innerHTML += `
                <div class="card-folder" onclick="verCongs('${c}')">
                    <span style="font-size:3rem;">${iconoAMostrar}</span>
                    <h3 style="margin-top:10px;">${c}</h3>
                </div>`;
            });
        }

        function verCongs(c) {
            nivel = "congs"; ciuSel = c; document.getElementById('btnBack').style.display = 'inline-block';
            document.getElementById('tituloTxt').innerText = "Congregaciones en " + c;
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            [...new Set(miembros.filter(m => m.ciudad === c).map(m => m.cong))].forEach(co => {
                grid.innerHTML += `<div class="card-folder" onclick="verMiembros('${c}','${co}')"><span style="font-size:3rem;">⛪</span><h3>${co}</h3></div>`;
            });
        }

        function verMiembros(c, co) {
            nivel = "miembros"; document.getElementById('tituloTxt').innerText = "Fiscalizadores de " + co;
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            miembros.filter(m => m.ciudad === c && m.cong === co).forEach(m => {
                grid.innerHTML += `<div class="card-folder">
                    <img src="${m.foto || 'https://via.placeholder.com/80'}" class="card-img-circle" onclick="ampliarFoto(this.src)">
                    <div onclick="verCV('${m.id}')"><h3>${m.nombre} ${m.nacionalidad && m.nacionalidad !== "undefined" ? m.nacionalidad : ''}</h3></div>
                </div>`;
            });
        }

        function volverAtras() { if(nivel === "miembros") verCongs(ciuSel); else renderCiudades(); }

        function verCV(id) {
            const m = miembros.find(x => x.id === id);
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'block';
            const flag = m.nacionalidad && m.nacionalidad !== "undefined" ? m.nacionalidad : '';
            document.getElementById('cvContent').innerHTML = `
                <div class="cv-header">
                    <img src="${m.foto || ''}" class="cv-photo-main" onclick="ampliarFoto(this.src)">
                    <h1>${m.nombre} ${flag}</h1>
                    <p>${m.ciudad} • ${m.cong}</p>
                </div>
                <div class="cv-grid">
                    <div class="cv-side">
                        <div class="section-title">Datos Personales</div>
                        <span class="data-label">WhatsApp</span><span class="data-value">${m.tel || '---'}</span>
                        <span class="data-label">Documento</span><span class="data-value">${m.doc || '---'}</span>
                        <span class="data-label">Edad</span><span class="data-value">${m.edad || '---'}</span>
                        <span class="data-label">Estado Civil</span><span class="data-value">${m.estCiv || '---'}</span>
                        <button class="btn-primary" style="width:100%; margin-top:20px;" onclick="abrirEditor('${m.id}')">MODIFICAR</button>
                    </div>
                    <div class="cv-body">
                        <div class="section-title">Trayectoria</div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                            <div><span class="data-label">Ocupación Espiritual</span><span class="data-value">${m.ocuEsp || '---'}</span></div>
                            <div><span class="data-label">Ocupación Material</span><span class="data-value">${m.ocuMat || '---'}</span></div>
                            <div><span class="data-label">Perseverancia</span><span class="data-value">${m.anos || '0'} años</span></div>
                            <div><span class="data-label">Estado Actual</span><span class="data-value">${m.estAct || '---'}</span></div>
                            <div style="grid-column: span 2;"><span class="data-label">Fiscalizador de</span><span class="data-value">${m.fisc || '---'}</span></div>
                        </div>
                        <div class="section-title" style="margin-top:30px;">Historial</div>
                        <p style="white-space:pre-line; color:var(--texto-sec);">${m.hist || '---'}</p>
                    </div>
                </div>`;
        }

        function abrirEditor(id = null) {
            idEdit = id; document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'none'; document.getElementById('vistaEditor').style.display = 'block';
            if(id) {
                const m = miembros.find(x => x.id === id);
                document.getElementById('inNom').value = m.nombre; document.getElementById('inDoc').value = m.doc || "";
                document.getElementById('inNacIo').value = (m.nacionalidad && m.nacionalidad !== "undefined") ? m.nacionalidad : "🇵🇾";
                document.getElementById('inEdad').value = m.edad || ""; document.getElementById('inTel').value = m.tel || "";
                document.getElementById('inCiu').value = m.ciudad; document.getElementById('inCong').value = m.cong;
                document.getElementById('inEstCiv').value = m.estCiv || ""; document.getElementById('inOcuEsp').value = m.ocuEsp || "";
                document.getElementById('inOcuMat').value = m.ocuMat || ""; document.getElementById('inAnos').value = m.anos || "";
                document.getElementById('inEstAct').value = m.estAct || ""; document.getElementById('inFisc').value = m.fisc || "";
                document.getElementById('inHist').value = m.hist || ""; fotoURL = m.foto || "";
                document.getElementById('prevFoto').src = m.foto || "https://via.placeholder.com/120";
            } else {
                document.querySelectorAll('#vistaEditor input, #vistaEditor textarea').forEach(i => i.value = "");
                document.getElementById('inNacIo').value = "🇵🇾";
                document.getElementById('prevFoto').src = "https://via.placeholder.com/120"; fotoURL = "";
            }
        }

        function subirFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { fotoURL = e.target.result; document.getElementById('prevFoto').src = fotoURL; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function guardar() {
            const d = {
                nombre: document.getElementById('inNom').value, doc: document.getElementById('inDoc').value,
                nacionalidad: document.getElementById('inNacIo').value, edad: document.getElementById('inEdad').value,
                tel: document.getElementById('inTel').value, ciudad: document.getElementById('inCiu').value,
                cong: document.getElementById('inCong').value, estCiv: document.getElementById('inEstCiv').value,
                ocuEsp: document.getElementById('inOcuEsp').value, ocuMat: document.getElementById('inOcuMat').value,
                anos: document.getElementById('inAnos').value, estAct: document.getElementById('inEstAct').value,
                fisc: document.getElementById('inFisc').value, hist: document.getElementById('inHist').value,
                foto: fotoURL, modificado: new Date().getTime()
            };
            if(!d.nombre || !d.ciudad) return alert("Nombre y Ciudad son obligatorios");
            if(idEdit) await db.collection("curriculums").doc(idEdit).update(d);
            else await db.collection("curriculums").add(d);
            irDashboard();
        }

        irDashboard();
    </script>
</body>
</html>
