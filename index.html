<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>FISCALIZADORES</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --texto: #f8fafc;
            --texto-sec: #94a3b8; --accent: #38bdf8; --borde: #334155;
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --card: #ffffff; --texto: #1e293b;
            --texto-sec: #64748b; --accent: #0284c7; --borde: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }

        body { background-color: var(--bg); color: var(--texto); overflow-x: hidden; width: 100%; }

        /* --- ESTILOS DEL ZOOM MEJORADO --- */
        #imgOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; justify-content: center; 
            align-items: center; z-index: 9999; overflow: auto;
        }
        #imgFull { 
            max-width: 100%; height: auto; 
            transition: transform 0.3s ease;
            cursor: zoom-out;
        }
        .close-zoom {
            position: fixed; top: 20px; right: 20px; background: white; color: black;
            width: 40px; height: 40px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
            font-size: 20px; z-index: 10000; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        /* ---------------------------------- */

        .flag-img { width: 60px; height: auto; border-radius: 4px; }

        #vistaLogin { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 20px; }
        .login-card { background: var(--card); padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--borde); }

        input, select, textarea { font-size: 16px !important; background: var(--card); border: 1px solid var(--borde); color: var(--texto); padding: 12px; border-radius: 10px; width: 100%; outline: none; }
        
        header { background: var(--card); padding: 0.8rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--borde); position: sticky; top: 0; z-index: 1000; }
        .logo-container { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .app-logo { height: 45px; width: auto; border-radius: 8px; }
        .logo-text { font-weight: 800; font-size: 1.2rem; }

        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .btn-danger { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; width: 100%; }

        .grid-main { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px 40px; }
        .card-folder { background: var(--card); padding: 25px; border-radius: 18px; border: 1px solid var(--borde); text-align: center; cursor: pointer; position: relative; }
        .folder-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 15px; }
        
        .cv-container { max-width: 800px; margin: 20px auto; background: var(--card); border-radius: 24px; overflow: hidden; margin-bottom: 50px; }
        .cv-banner { background: #0284c7; padding: 40px 20px; text-align: center; color: white; position: relative; }
        .cv-photo { width: 160px; height: 160px; border-radius: 50%; border: 4px solid white; object-fit: cover; margin-bottom: 20px; cursor: pointer; }

        .cv-name { font-size: 2rem; font-weight: 800; text-transform: uppercase; }
        .cv-content { display: grid; grid-template-columns: 1fr 1.5fr; gap: 0; }
        .cv-left { background: rgba(0,0,0,0.05); padding: 40px; border-right: 1px solid var(--borde); }
        .cv-right { padding: 40px; }

        .section-label { font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; border-bottom: 1px solid var(--borde); margin-bottom: 20px; display: block; }
        .info-group { margin-bottom: 20px; }
        .info-label { font-size: 0.85rem; color: var(--texto-sec); display: block; }
        .info-value { font-size: 1.1rem; font-weight: 600; }
        .historial-box { white-space: pre-line; color: var(--texto-sec); font-size: 1rem; margin-bottom: 30px; }

        #mainHeader, #vistaDashboard, #vistaCV, #vistaEditor { display: none; }
    </style>
</head>
<body>

    <!-- Overlay de Zoom -->
    <div id="imgOverlay">
        <div class="close-zoom" onclick="cerrarZoom()">✕</div>
        <img id="imgFull" onclick="cerrarZoom()">
    </div>

    <div id="vistaLogin">
        <div class="login-card">
            <img src="logo.png" style="height: 70px; margin-bottom: 15px; border-radius: 12px;">
            <h2 style="margin-bottom: 25px; font-weight: 800;">FISCALIZADORES</h2>
            <input type="email" id="loginEmail" placeholder="Email" style="margin-bottom: 15px;">
            <input type="password" id="loginPass" placeholder="Contraseña" style="margin-bottom: 25px;">
            <button class="btn-primary" style="width: 100%;" onclick="login()">INGRESAR</button>
            <p id="loginError" style="color: #ff4444; margin-top: 15px;"></p>
        </div>
    </div>

    <header id="mainHeader">
        <div class="logo-container" onclick="location.reload()">
            <img src="logo.png" class="app-logo">
            <span class="logo-text">FISCALIZADORES</span>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <span id="userBadge" style="font-size: 0.7rem; background: var(--borde); padding: 4px 8px; border-radius: 5px; color: var(--accent);"></span>
            <button onclick="logout()" style="background:transparent; border:none; color:#ff4444; font-weight:bold; cursor:pointer;">SALIR</button>
        </div>
    </header>

    <div id="vistaDashboard">
        <div style="padding: 20px 40px; display: flex; gap: 15px;">
            <input type="text" id="busqueda" placeholder="Buscar por Nombre, Ciudad o Congregación..." onkeyup="buscador()">
            <button class="btn-primary" onclick="abrirEditor()">+ NUEVO</button>
        </div>
        <div style="padding: 0 40px;">
            <button id="btnBack" class="btn-outline" onclick="volverAtras()" style="display:none; margin-bottom: 20px;">← VOLVER</button>
            <h3 id="tituloTxt" style="font-weight: 800; margin-bottom: 10px;">Listado de Ciudades</h3>
        </div>
        <div id="gridMain" class="grid-main"></div>
    </div>

    <div id="vistaCV">
        <div style="padding: 20px 40px;"><button class="btn-outline" onclick="irDashboard()">← VOLVER</button></div>
        <div id="cvContent" class="cv-container"></div>
    </div>

    <div id="vistaEditor">
        <!-- Editor igual al anterior -->
        <div class="editor-box" style="max-width: 850px; margin: 30px auto; background: var(--card); padding: 40px; border-radius: 20px;">
            <h2 id="tituloEditor">Registro de Datos</h2>
            <div style="text-align: center; margin: 20px 0;">
                <img id="prevFoto" src="https://via.placeholder.com/120" style="width:120px; height:120px; border-radius:50%; object-fit:cover;">
                <input type="file" id="fileIn" onchange="subirFoto(this)" style="display:none" accept="image/*">
                <button class="btn-outline" style="display:block; margin: 10px auto;" onclick="document.getElementById('fileIn').click()">Cambiar Foto</button>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="text" id="inNom" placeholder="Nombre Completo">
                <input type="date" id="inFechaNac">
                <select id="inNacIo" onchange="actualizarProvinciasEditor()">
                    <option value="">País</option>
                    <option value="🇦🇷">🇦🇷 Argentina</option>
                    <option value="🇵🇾">🇵🇾 Paraguay</option>
                    <option value="🇧🇷">🇧🇷 Brasil</option>
                </select>
                <select id="inCiu"><option value="">Ciudad</option></select>
                <input type="text" id="inTel" placeholder="WhatsApp">
                <input type="text" id="inDoc" placeholder="Documento">
                <input type="text" id="inCong" placeholder="Congregación">
                <input type="text" id="inEstCiv" placeholder="Estado Civil">
                <input type="text" id="inOcuEsp" placeholder="Ocupación Espiritual">
                <input type="text" id="inOcuMat" placeholder="Ocupación Material">
                <select id="inFisc">
                    <option value="SOLTEROS">SOLTEROS</option>
                    <option value="SOLTERAS">SOLTERAS</option>
                    <option value="CÓNYUGALES">CÓNYUGALES</option>
                    <option value="SUSPENDIDOS">SUSPENDIDOS</option>
                    <option value="DACYP">DACYP</option>
                </select>
                <textarea id="inHist" placeholder="Historial..." style="grid-column: span 2;" rows="4"></textarea>
            </div>
            <button class="btn-primary" style="width:100%; margin-top:20px;" onclick="guardar()">GUARDAR</button>
            <button id="btnEliminar" class="btn-danger" onclick="eliminarRegistro()">ELIMINAR</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBkP6NALOTSHGd4QVgAxHyeJzCCnOUDY6M",
            authDomain: "fiscalizadores-elite.firebaseapp.com",
            projectId: "fiscalizadores-elite",
            storageBucket: "fiscalizadores-elite.firebasestorage.app",
            messagingSenderId: "482161512140",
            appId: "1:482161512140:web:95dd229a858ab627a03c69"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const USUARIOS_SISTEMA = {
            "admi@com": { pass: "admigeneral.26", cat: "ADMIN" },
            "solteros@com": { pass: "4532", cat: "SOLTEROS" },
            "solteras@com": { pass: "4531", cat: "SOLTERAS" },
            "conyugales@com": { pass: "8758", cat: "CÓNYUGALES" },
            "suspendidos@com": { pass: "9823", cat: "SUSPENDIDOS" },
            "dacyp@com": { pass: "1630", cat: "DACYP" }
        };

        const ubicaciones = {
            "🇦🇷": ["Buenos Aires", "Catamarca", "Chaco", "Chubut", "Córdoba", "Corrientes", "Entre Ríos", "Formosa", "Jujuy", "La Pampa", "La Rioja", "Mendoza", "Misiones", "Neuquén", "Río Negro", "Salta", "San Juan", "San Luis", "Santa Cruz", "Santa Fe", "Santiago del Estero", "Tierra del Fuego", "Tucumán"],
            "🇵🇾": ["Asunción", "Concepción", "San Pedro", "Cordillera", "Guairá", "Caaguazú", "Caazapá", "Itapúa", "Misiones", "Paraguarí", "Alto Paraná", "Central", "Ñeembucú", "Amambay", "Canindeyú", "Presidente Hayes", "Boquerón", "Alto Paraguay"],
            "🇧🇷": ["Acre", "Alagoas", "Amapá", "Amazonas", "Bahia", "Ceará", "Distrito Federal", "Espírito Santo", "Goiás", "Maranhão", "Mato Grosso", "Mato Grosso do Sul", "Minas Gerais", "Pará", "Paraíba", "Paraná", "Pernambuco", "Piauí", "Rio de Janeiro", "Rio Grande do Norte", "Rio Grande do Sul", "Rondônia", "Roraima", "Santa Catarina", "São Paulo", "Sergipe", "Tocantins"]
        };

        let miembros = [];
        let idEdit = null;
        let nivel = "ciudades";
        let ciuSel = ""; let nacSel = ""; let congSelGlobal = "";
        let categoriaUsuario = "";

        // LOGIN Y SESIÓN
        function login() {
            const email = document.getElementById('loginEmail').value.toLowerCase().trim();
            const pass = document.getElementById('loginPass').value.trim();
            if (USUARIOS_SISTEMA[email] && USUARIOS_SISTEMA[email].pass === pass) {
                categoriaUsuario = USUARIOS_SISTEMA[email].cat;
                localStorage.setItem('fiscalizador_cat', categoriaUsuario);
                localStorage.setItem('fiscalizador_session', 'active');
                mostrarSistema();
            } else { alert("Error de acceso"); }
        }

        function logout() { localStorage.clear(); location.reload(); }

        function mostrarSistema() {
            document.getElementById('vistaLogin').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'flex';
            document.getElementById('userBadge').innerText = categoriaUsuario;
            irDashboard();
        }

        // FUNCIONES DE ZOOM MEJORADO
        function abrirZoomFoto(src) {
            if(!src || src.includes('placeholder')) return;
            const overlay = document.getElementById('imgOverlay');
            const img = document.getElementById('imgFull');
            img.src = src;
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Bloquea el scroll del fondo
        }

        function cerrarZoom() {
            document.getElementById('imgOverlay').style.display = 'none';
            document.body.style.overflow = 'auto'; // Libera el scroll
        }

        // BUSCADOR (POR NOMBRE, CONGREGACIÓN Y CIUDAD)
        function buscador() {
            const texto = document.getElementById('busqueda').value.toLowerCase().trim();
            const grid = document.getElementById('gridMain');
            if (texto === "") { volverAtras(); return; }
            
            grid.innerHTML = "";
            document.getElementById('btnBack').style.display = 'inline-block';
            document.getElementById('tituloTxt').innerText = "Resultados";

            const filtrados = miembros.filter(m => 
                m.nombre.toLowerCase().includes(texto) || 
                m.ciudad.toLowerCase().includes(texto) || 
                m.cong.toLowerCase().includes(texto)
            );

            filtrados.forEach(m => {
                grid.innerHTML += `<div class="card-folder" onclick="verCV('${m.id}')">
                    <img src="${m.foto || 'https://via.placeholder.com/80'}" style="width:70px; height:70px; border-radius:50%; object-fit:cover; margin-bottom:10px; border:2px solid var(--accent)">
                    <h3>${m.nombre}</h3>
                    <p style="font-size:0.8rem; color:var(--accent)">${m.cong}</p>
                    <p style="font-size:0.7rem;">${m.ciudad}</p>
                </div>`;
            });
        }

        // LÓGICA DE NAVEGACIÓN
        function escuchar() {
            db.collection("curriculums").onSnapshot(snap => {
                let todos = [];
                snap.forEach(doc => todos.push({ id: doc.id, ...doc.data() }));
                miembros = (categoriaUsuario === "ADMIN") ? todos : todos.filter(m => m.fisc === categoriaUsuario);
                renderCiudades();
            });
        }

        function renderCiudades() {
            nivel = "ciudades";
            document.getElementById('btnBack').style.display = 'none';
            document.getElementById('tituloTxt').innerText = "Listado de Ciudades";
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            const combinaciones = [...new Set(miembros.map(m => JSON.stringify({c: m.ciudad, n: m.nacionalidad})))].map(s => JSON.parse(s));
            combinaciones.forEach(comb => {
                grid.innerHTML += `<div class="card-folder" onclick="verCongs('${comb.c}', '${comb.n}')">
                    <h3>${comb.n} ${comb.c}</h3>
                </div>`;
            });
        }

        function verCongs(c, n) {
            nivel = "congs"; ciuSel = c; nacSel = n;
            document.getElementById('btnBack').style.display = 'inline-block';
            document.getElementById('tituloTxt').innerText = `Congregaciones en ${c}`;
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            const congs = [...new Set(miembros.filter(m => m.ciudad === c).map(m => m.cong))];
            congs.forEach(co => {
                grid.innerHTML += `<div class="card-folder" onclick="verMiembros('${c}','${n}','${co}')">
                    <img src="https://via.placeholder.com/100?text=⛪" class="folder-img">
                    <h3>${co}</h3>
                </div>`;
            });
        }

        function verMiembros(c, n, co) {
            nivel = "miembros"; congSelGlobal = co;
            document.getElementById('tituloTxt').innerText = co;
            const grid = document.getElementById('gridMain'); grid.innerHTML = "";
            miembros.filter(m => m.ciudad === c && m.cong === co).forEach(m => {
                grid.innerHTML += `<div class="card-folder" onclick="verCV('${m.id}')">
                    <img src="${m.foto || 'https://via.placeholder.com/80'}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; margin-bottom:10px; border:2px solid var(--accent)">
                    <h3>${m.nombre}</h3>
                </div>`;
            });
        }

        function volverAtras() { if(nivel === "miembros") verCongs(ciuSel, nacSel); else renderCiudades(); }

        function verCV(id) {
            const m = miembros.find(x => x.id === id);
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'block';
            document.getElementById('cvContent').innerHTML = `
                <div class="cv-banner">
                    <img src="${m.foto || 'https://via.placeholder.com/160'}" class="cv-photo" onclick="abrirZoomFoto(this.src)">
                    <div class="cv-name">${m.nombre}</div>
                    <div class="cv-sub">📍 ${m.ciudad} | ⛪ ${m.cong}</div>
                </div>
                <div class="cv-content">
                    <div class="cv-left">
                        <span class="section-label">Datos</span>
                        <div class="info-group"><span class="info-label">WhatsApp</span><span class="info-value">${m.tel}</span></div>
                        <div class="info-group"><span class="info-label">Documento</span><span class="info-value">${m.doc}</span></div>
                    </div>
                    <div class="cv-right">
                        <span class="section-label">Historial</span>
                        <div class="historial-box">${m.hist || 'Sin datos.'}</div>
                        <button class="btn-primary" style="width:100%" onclick="abrirEditor('${m.id}')">EDITAR</button>
                    </div>
                </div>`;
        }

        function irDashboard() { 
            document.getElementById('vistaDashboard').style.display = 'block'; 
            document.getElementById('vistaCV').style.display = 'none'; 
            document.getElementById('vistaEditor').style.display = 'none'; 
            escuchar();
        }

        function abrirEditor(id = null) {
            idEdit = id;
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'none';
            document.getElementById('vistaEditor').style.display = 'block';
            if(!id) { /* Limpiar campos */ }
            else { /* Cargar datos del miembro */ }
        }

        function actualizarProvinciasEditor() {
            const pais = document.getElementById("inNacIo").value;
            const ciuSelect = document.getElementById("inCiu");
            ciuSelect.innerHTML = '<option value="">Seleccione</option>';
            if(ubicaciones[pais]) {
                ubicaciones[pais].forEach(c => {
                    const opt = document.createElement("option"); opt.value = c; opt.textContent = c; ciuSelect.appendChild(opt);
                });
            }
        }

        window.onload = () => {
            if(localStorage.getItem('fiscalizador_session') === 'active') {
                categoriaUsuario = localStorage.getItem('fiscalizador_cat');
                mostrarSistema();
            }
        };
    </script>
</body>
</html>
