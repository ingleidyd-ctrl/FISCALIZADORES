<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA FISCALIZADORES - ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --azul-header: #0a1f33;
            --azul-claro: #11a0c8;
            --bg-gris: #f4f7fa;
            --texto-oscuro: #334155;
            --flecha: #4a6fa5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-gris); color: var(--texto-oscuro); }

        /* --- LOGIN --- */
        #vistaLogin { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--azul-header); }
        .login-box { background: white; padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; }

        /* --- HEADER Y DASHBOARD --- */
        header { background: var(--azul-header); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        header h1 { font-size: 1.4rem; letter-spacing: 2px; font-weight: 800; color: var(--azul-claro); }
        
        .search-section { background: white; padding: 20px 40px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 20px; }
        .search-input { flex-grow: 1; padding: 12px 20px; border-radius: 10px; border: 1px solid #cbd5e1; outline: none; }
        .btn-new { background: var(--azul-claro); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        .container { padding: 30px 40px; }
        .grid-folder { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .folder-card { background: white; padding: 30px; border-radius: 15px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .folder-card:hover { border-color: var(--azul-claro); transform: translateY(-5px); }
        .folder-icon { font-size: 3.5rem; margin-bottom: 15px; display: block; }
        .folder-badge { background: #f0f9ff; color: var(--azul-claro); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-top: 10px; display: inline-block; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; border: 1px solid #e2e8f0; }
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .card-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--azul-claro); }

        /* --- DISEÑO CV IDÉNTICO A TUS FOTOS --- */
        #vistaCV { display: none; }
        .cv-wrapper { width: 100%; min-height: 100vh; display: flex; }
        
        .cv-aside { width: 350px; background: var(--azul-header); color: white; padding: 60px 40px; min-height: 100vh; }
        .cv-photo-circle { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--azul-claro); overflow: hidden; margin: 0 auto 40px; }
        .cv-photo-circle img { width: 100%; height: 100%; object-fit: cover; }
        
        .cv-aside h3 { border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin: 30px 0 15px; font-size: 1rem; letter-spacing: 1px; color: var(--azul-claro); }
        .aside-item { margin-bottom: 12px; font-size: 0.95rem; display: flex; align-items: center; gap: 10px; }

        .cv-main { flex: 1; padding: 80px 60px; background: white; }
        .cv-main h1 { font-size: 3.5rem; font-weight: 800; color: #1e293b; margin-bottom: 5px; }
        .cv-subtitle-blue { color: var(--azul-claro); font-weight: 700; text-transform: uppercase; font-size: 0.9rem; margin-bottom: 50px; }
        
        .cv-section-title { font-size: 1.5rem; font-weight: 700; color: #334155; margin-bottom: 15px; border-left: 5px solid var(--azul-header); padding-left: 15px; }
        .cv-historia { font-size: 1rem; color: #64748b; line-height: 1.7; margin-bottom: 40px; }
        
        /* Flechas azules */
        .cv-info-row { position: relative; padding-left: 35px; margin-bottom: 25px; font-size: 1.05rem; }
        .cv-info-row::before { content: ''; position: absolute; left: 0; top: 4px; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 14px solid var(--flecha); }
        .cv-info-row strong { color: #1e293b; display: block; margin-bottom: 3px; }

        /* EDITOR */
        #vistaEditor { display: none; padding: 40px; }
        .editor-box { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="vistaLogin">
        <div class="login-box">
            <h2 style="margin-bottom: 20px;">SISTEMA ELITE 🕊️</h2>
            <input type="text" id="userInput" placeholder="Usuario">
            <input type="password" id="passInput" placeholder="Contraseña">
            <button class="btn-new" style="width:100%" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <div id="vistaDashboard" style="display:none;">
        <header>
            <h1>FISCALIZADORES</h1>
            <button onclick="logout()" style="background:none; border:1px solid white; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">Cerrar Sesión</button>
        </header>

        <div class="search-section">
            <input type="text" id="inputBusqueda" class="search-input" placeholder="Buscar por nombre, ciudad o filial..." onkeyup="buscador()">
            <button class="btn-new" onclick="abrirEditor()">+ REGISTRAR NUEVO</button>
        </div>

        <div class="container">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px;">
                <h2 id="txtTitulo">CIUDADES:</h2>
                <button id="btnVolver" onclick="volverAtras()" style="display:none; color:var(--azul-claro); background:none; border:none; cursor:pointer; font-weight:bold;">← Volver</button>
            </div>
            <div id="mainGrid" class="grid-folder"></div>
        </div>
    </div>

    <div id="vistaCV">
        <div class="cv-wrapper" id="cvDetalle">
            </div>
    </div>

    <div id="vistaEditor">
        <div class="editor-box">
            <h2>Datos del Fiscalizador</h2>
            <div class="form-grid">
                <div style="grid-column: span 2;">
                    <label>Foto URL</label><input type="text" id="inFoto" placeholder="Link de la foto">
                </div>
                <div style="grid-column: span 2;"><label>Nombre</label><input type="text" id="inNom"></div>
                <div><label>Ciudad</label><input type="text" id="inCiu"></div>
                <div><label>Filial</label><input type="text" id="inCong"></div>
                <div><label>WhatsApp</label><input type="text" id="inTel"></div>
                <div><label>Edad</label><input type="number" id="inEdad"></div>
                <div><label>Estado Civil</label><input type="text" id="inCiv"></div>
                <div><label>Fiscalizador de:</label><input type="text" id="inDeDe"></div>
                <div style="grid-column: span 2;"><label>Historial de Vida</label><textarea id="inHist" rows="4"></textarea></div>
                <div><label>Ocupación Espiritual</label><input type="text" id="inEsp"></div>
                <div><label>Ocupación Material</label><input type="text" id="inMat"></div>
                <div><label>Años Perseverancia</label><input type="text" id="inAnos"></div>
                <div><label>Estado Actual</label><input type="text" id="inEst"></div>
            </div>
            <button class="btn-new" style="width:100%; margin-top:20px;" onclick="guardar()">GUARDAR</button>
            <button onclick="irDashboard()" style="width:100%; margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBkP6NALOTSHGd4QVgAxHyeJzCCnOUDY6M",
          authDomain: "fiscalizadores-elite.firebaseapp.com",
          projectId: "fiscalizadores-elite",
          storageBucket: "fiscalizadores-elite.firebasestorage.app",
          messagingSenderId: "482161512140",
          appId: "1:482161512140:web:95dd229a858ab627a03c69"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let dataLocal = [];
        let idEdicion = null;

        function login() {
            if(document.getElementById('userInput').value === "admin") {
                document.getElementById('vistaLogin').style.display = 'none';
                irDashboard();
            }
        }

        function logout() { location.reload(); }

        function irDashboard() {
            document.getElementById('vistaDashboard').style.display = 'block';
            document.getElementById('vistaCV').style.display = 'none';
            document.getElementById('vistaEditor').style.display = 'none';
            db.collection("curriculums").onSnapshot(qs => {
                dataLocal = [];
                qs.forEach(doc => dataLocal.push({id: doc.id, ...doc.data()}));
                renderCiudades();
            });
        }

        function renderCiudades() {
            document.getElementById('btnVolver').style.display = 'none';
            const cont = document.getElementById('mainGrid');
            cont.innerHTML = "";
            const ciudades = [...new Set(dataLocal.map(f => f.ciudad))];
            ciudades.forEach(ciu => {
                cont.innerHTML += `<div class="folder-card" onclick="verFiscalizadores('${ciu}')"><span class="folder-icon">📍</span><h3>${ciu}</h3></div>`;
            });
        }

        function verFiscalizadores(ciu) {
            document.getElementById('btnVolver').style.display = 'block';
            const cont = document.getElementById('mainGrid');
            cont.innerHTML = "";
            dataLocal.filter(f => f.ciudad === ciu).forEach(f => {
                cont.innerHTML += `
                <div class="card">
                    <div class="card-header">
                        <img src="${f.foto}" class="card-img">
                        <div><h3>${f.nombre}</h3><p>${f.cong}</p></div>
                    </div>
                    <button class="btn-new" style="width:100%" onclick="verCV('${f.id}')">ABRIR PERFIL</button>
                </div>`;
            });
        }

        function verCV(id) {
            const f = dataLocal.find(x => x.id === id);
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'block';
            
            document.getElementById('cvDetalle').innerHTML = `
                <div class="cv-aside">
                    <button onclick="irDashboard()" style="color:white; background:none; border:none; cursor:pointer; margin-bottom:20px;">← ATRÁS</button>
                    <div class="cv-photo-circle"><img src="${f.foto}"></div>
                    <h3>CONTACTO</h3>
                    <div class="aside-item">📱 ${f.tel}</div>
                    <div class="aside-item">📍 ${f.ciudad}</div>
                    <div class="aside-item">⛪ ${f.cong}</div>
                    <h3>DATOS</h3>
                    <div class="aside-item">🎂 Edad: ${f.edad} años</div>
                    <div class="aside-item">💍 Estado: ${f.civ}</div>
                    <div class="aside-item">📋 Fiscalizador: ${f.deDe}</div>
                </div>
                <div class="cv-main">
                    <h1>${f.nombre}</h1>
                    <div class="cv-subtitle-blue">CIUDAD - ${f.ciudad} / CONGREGACIÓN - ${f.cong}</div>
                    <h2 class="cv-section-title">Historial de Vida</h2>
                    <p class="cv-historia">${f.hist}</p>
                    <div class="cv-info-row"><strong>Ocupación Espiritual:</strong> ${f.esp}</div>
                    <div class="cv-info-row"><strong>Ocupación Material:</strong> ${f.mat}</div>
                    <div class="cv-info-row"><strong>Años Perseverancia:</strong> ${f.anos}</div>
                    <div class="cv-info-row"><strong>Estado Actual:</strong> ${f.est}</div>
                </div>`;
        }

        function abrirEditor() {
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaEditor').style.display = 'block';
        }

        async function guardar() {
            const doc = {
                nombre: document.getElementById('inNom').value,
                ciudad: document.getElementById('inCiu').value,
                cong: document.getElementById('inCong').value,
                tel: document.getElementById('inTel').value,
                edad: document.getElementById('inEdad').value,
                civ: document.getElementById('inCiv').value,
                deDe: document.getElementById('inDeDe').value,
                hist: document.getElementById('inHist').value,
                esp: document.getElementById('inEsp').value,
                mat: document.getElementById('inMat').value,
                anos: document.getElementById('inAnos').value,
                est: document.getElementById('inEst').value,
                foto: document.getElementById('inFoto').value
            };
            await db.collection("curriculums").add(doc);
            irDashboard();
        }
    </script>
</body>
</html>
