<!DOCTYPE html>
<html lang="es">
<head> 
    <link rel="manifest" href="manifest.json?v=106">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA FISCALIZADORES</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --azul-header: #0a1f33;
            --azul-claro: #11a0c8;
            --bg-gris: #f4f7fa;
            --texto: #334155;
            --flecha: #4a6fa5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-gris); color: var(--texto); }

        /* Estilos de Login y Header se mantienen igual */
        #vistaLogin { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--azul-header); }
        .login-box { background: white; padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        header { background: var(--azul-header); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        header h1 { font-size: 1.4rem; letter-spacing: 2px; font-weight: 800; color: var(--azul-claro); }
        .header-subtext { font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; }

        /* Seccion de Busqueda */
        .search-section { background: white; padding: 20px 40px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 20px; align-items: center; }
        .search-input { flex-grow: 1; padding: 12px 20px; border-radius: 10px; border: 1px solid #cbd5e1; outline: none; }
        .btn-new { background: var(--azul-claro); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        .container { padding: 30px 40px; }
        .grid-folder { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .folder-card { background: white; padding: 30px; border-radius: 15px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .folder-card:hover { border-color: var(--azul-claro); transform: translateY(-5px); }
        .folder-icon { font-size: 3.5rem; margin-bottom: 15px; min-height: 70px; display: flex; align-items: center; justify-content: center; }
        .folder-badge { background: #f0f9ff; color: var(--azul-claro); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-top: 10px; display: inline-block; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; border: 1px solid #e2e8f0; position: relative; }
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .card-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--azul-claro); }
        .btn-view { width: 100%; padding: 10px; background: #f0f9ff; border: none; border-radius: 8px; color: var(--azul-claro); font-weight: 700; cursor: pointer; }

        /* VISTA CV - EL AJUSTE TIPO WHATSAPP */
        #vistaDashboard, #vistaCV, #vistaEditor { display: none; }
        #vistaCV { padding: 20px; }
        .cv-sheet { max-width: 950px; margin: 0 auto; background: white; display: flex; flex-direction: row; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1); position: relative; }
        
        /* Columna izquierda fija para que no agrande la pagina */
        .cv-aside { width: 300px; background: var(--azul-header); color: white; padding: 30px 20px; flex-shrink: 0; text-align: center; }
        .cv-main { flex-grow: 1; padding: 40px; min-width: 320px; background: white; }

        /* Foto estilo WhatsApp (Grande y centrada) */
        .cv-photo { width: 220px; height: 220px; border-radius: 50%; border: 6px solid rgba(17, 160, 200, 0.3); object-fit: cover; margin: 0 auto 25px; display: block; box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: 0.3s; }
        .cv-photo:hover { border-color: var(--azul-claro); transform: scale(1.02); }

        .cv-title { color: var(--azul-claro); text-transform: uppercase; font-size: 0.85rem; margin: 25px 0 12px; border-bottom: 1px solid #334155; padding-bottom: 5px; text-align: left; font-weight: 800; }
        .cv-aside p { text-align: left; margin-bottom: 10px; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .cv-bullet { position: relative; padding-left: 30px; margin-bottom: 15px; line-height: 1.4; }
        .cv-bullet::before { content: ''; position: absolute; left: 0; top: 4px; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-left: 12px solid var(--flecha); }

        .btn-edit-cv { position: absolute; top: 20px; right: 20px; background: #f1f5f9; color: var(--azul-header); border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; z-index: 10; }

        /* Vista Editor */
        #vistaEditor { padding: 40px; }
        .editor-box { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .preview-area { grid-column: span 2; display: flex; align-items: center; gap: 20px; background: #f8fafc; padding: 15px; border-radius: 10px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; outline: none; }

        /* Responsive para celulares */
        @media (max-width: 768px) {
            .cv-sheet { flex-direction: column; }
            .cv-aside { width: 100%; }
            .cv-main { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="vistaLogin">
        <div class="login-box">
            <h2 style="margin-bottom: 20px; color: var(--azul-header);">FISCALIZADORES 🕊️</h2>
            <input type="text" id="userInput" placeholder="Usuario">
            <input type="password" id="passInput" placeholder="Contraseña">
            <button class="btn-new" style="width:100%" onclick="login()">ENTRAR AL SISTEMA</button>
            <p id="errorLogin" style="color:red; font-size:0.8rem; margin-top:10px; display:none;">Datos incorrectos</p>
        </div>
    </div>

    <div id="vistaDashboard">
        <header>
            <h1>FISCALIZADORES</h1>
            <div style="text-align: right;">
                <div class="header-subtext">CONGREGACIÓN CRISTIANA PUEBLO DE DIOS 🕊️</div>
                <button onclick="logout()" style="background:none; border:1px solid white; color:white; padding:2px 8px; border-radius:5px; font-size:0.7rem; cursor:pointer; margin-top:5px;">Cerrar Sesión</button>
            </div>
        </header>

        <div class="search-section">
            <input type="text" id="inputBusqueda" class="search-input" placeholder="🔍 Buscar por nombre, ciudad o filial..." onkeyup="buscador()">
            <button class="btn-new" onclick="abrirEditor()">+ REGISTRAR NUEVO</button>
        </div>

        <div class="container">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px;">
                <h2 id="txtTitulo">CIUDADES:</h2>
                <button id="btnVolver" onclick="volverAtras()" style="display:none; background:none; border:none; color:var(--azul-claro); cursor:pointer; font-weight:bold;">← Volver</button>
            </div>
            <div id="mainGrid" class="grid-folder"></div>
        </div>
    </div>

    <div id="vistaCV">
        <button onclick="irDashboard()" style="margin:20px; cursor:pointer; background:none; border:none; color:var(--azul-claro); font-weight:bold;">← VOLVER</button>
        <div id="cvDetalle" class="cv-sheet"></div>
    </div>

    <div id="vistaEditor">
        <div class="editor-box">
            <button onclick="irDashboard()" style="margin-bottom:20px; cursor:pointer; background:none; border:none; color:var(--azul-claro);">← Cancelar</button>
            <h2 id="editorTitulo">Nuevo Registro</h2>
            <div class="form-grid" style="margin-top:20px;">
                <div class="preview-area">
                    <img id="prevImg" src="https://via.placeholder.com/90" style="width:90px; height:90px; border-radius:50%; object-fit:cover;">
                    <input type="file" onchange="procesarFoto(this)">
                </div>
                <div style="grid-column: span 2;"><label>Nombre Completo</label><input type="text" id="inNom"></div>
                
                <div>
                    <label>País</label>
                    <select id="inPais">
                        <option value="Paraguay">🇵🇾 Paraguay</option>
                        <option value="Argentina">🇦🇷 Argentina</option>
                        <option value="Brasil">🇧🇷 Brasil</option>
                        <option value="Bolivia">🇧🇴 Bolivia</option>
                        <option value="España">🇪🇸 España</option>
                        <option value="EEUU">🇺🇸 EEUU</option>
                        <option value="Otro">🌍 Otro</option>
                    </select>
                </div>
                
                <div><label>Ciudad</label><input type="text" id="inCiu"></div>
                <div><label>Filial (Congregación)</label><input type="text" id="inCong"></div>
                <div style="grid-column: span 2;"><label>Función del Fiscalizador</label><input type="text" id="inFisc"></div>
                <div><label>WhatsApp</label><input type="text" id="inTel"></div>
                <div><label>Edad</label><input type="number" id="inEdad"></div>
                <div><label>Estado Civil</label><input type="text" id="inCiv"></div>
                <div><label>Años Perseverancia</label><input type="text" id="inAnos"></div>
                <div style="grid-column: span 2;"><label>Historial de Vida</label><textarea id="inHist" rows="4"></textarea></div>
                <div><label>Ocupación Espiritual</label><input type="text" id="inEsp"></div>
                <div><label>Ocupación Material</label><input type="text" id="inMat"></div>
                <div style="grid-column: span 2;"><label>Estado Actual</label><input type="text" id="inEst"></div>
                <button id="btnGuardar" class="btn-new" style="grid-column: span 2;" onclick="guardar()">GUARDAR REGISTRO</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBkP6NALOTSHGd4QVgAxHyeJzCCnOUDY6M",
          authDomain: "fiscalizadores-elite.firebaseapp.com",
          projectId: "fiscalizadores-elite",
          storageBucket: "fiscalizadores-elite.firebasestorage.app",
          messagingSenderId: "482161512140",
          appId: "1:482161512140:web:95dd229a858ab627a03c69"
        };

        firebase.initializeApp(firebaseConfig);
        const dbCloud = firebase.firestore();

        let dataLocal = [];
        let tmpFoto = "";
        let nivelActual = "ciudades";
        let ciudadSeleccionada = "";
        let idEdicion = null;

        const banderas = {
            "Paraguay": "🇵🇾", "Argentina": "🇦🇷", "Brasil": "🇧🇷", "Bolivia": "🇧🇴", "España": "🇪🇸", "EEUU": "🇺🇸", "Otro": "🌍"
        };

        function login() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            if(u === "admin" && p === "elite2026") {
                document.getElementById('vistaLogin').style.display = 'none';
                irDashboard();
            } else {
                document.getElementById('errorLogin').style.display = 'block';
            }
        }

        function logout() { location.reload(); }
        function irDashboard() { document.getElementById('vistaDashboard').style.display = 'block'; document.getElementById('vistaCV').style.display = 'none'; document.getElementById('vistaEditor').style.display = 'none'; escucharDatos(); }

        function escucharDatos() {
            dbCloud.collection("curriculums").orderBy("fecha", "desc").onSnapshot((querySnapshot) => {
                dataLocal = [];
                querySnapshot.forEach((doc) => { dataLocal.push({ id_cloud: doc.id, ...doc.data() }); });
                renderCiudades();
            });
        }

        function renderCiudades() {
            nivelActual = "ciudades";
            document.getElementById('txtTitulo').innerText = "CIUDADES:";
            document.getElementById('btnVolver').style.display = 'none';
            const cont = document.getElementById('mainGrid');
            cont.className = "grid-folder";
            cont.innerHTML = "";
            const ciudades = [...new Set(dataLocal.map(f => f.ciudad))];
            ciudades.forEach(ciu => {
                if(!ciu) return;
                const cant = dataLocal.filter(f => f.ciudad === ciu).length;
                cont.innerHTML += `<div class="folder-card" onclick="verCongregaciones('${ciu}')"><span class="folder-icon">📍</span><h3>${ciu}</h3><span class="folder-badge">${cant} Fiscalizadores</span></div>`;
            });
        }

        function verCongregaciones(ciu) {
            nivelActual = "congregaciones";
            ciudadSeleccionada = ciu;
            document.getElementById('txtTitulo').innerText = "Ciudad: " + ciu;
            document.getElementById('btnVolver').style.display = 'block';
            const cont = document.getElementById('mainGrid');
            cont.className = "grid-folder";
            cont.innerHTML = "";
            const congs = [...new Set(dataLocal.filter(f => f.ciudad === ciu).map(f => f.cong))];
            congs.forEach(con => {
                const registros = dataLocal.filter(f => f.ciudad === ciu && f.cong === con);
                const cant = registros.length;
                const pais = registros[0].pais || "Otro";
                const bandera = banderas[pais] || "🌍";
                cont.innerHTML += `<div class="folder-card" onclick="verFiscalizadores('${ciu}', '${con}')"><span class="folder-icon">${bandera}</span><h3>${con}</h3><span class="folder-badge">${cant} Miembros</span></div>`;
            });
        }

        function verFiscalizadores(ciu, con) {
            nivelActual = "fiscalizadores";
            document.getElementById('txtTitulo').innerText = "Congregación: " + con;
            const cont = document.getElementById('mainGrid');
            cont.className = "cards-grid";
            cont.innerHTML = "";
            const filtrados = dataLocal.filter(f => f.ciudad === ciu && f.cong === con);
            filtrados.forEach(f => {
                cont.innerHTML += `<div class="card"><div class="card-header"><img src="${f.foto || 'https://via.placeholder.com/60'}" class="card-img"><div><h3>${f.nombre}</h3><p style="font-size:0.8rem; color:var(--azul-claro);">${f.fisc}</p></div></div><button class="btn-view" onclick="verCV('${f.id_cloud}')">VER PERFIL</button></div>`;
            });
        }

        function volverAtras() { if (nivelActual === "fiscalizadores") verCongregaciones(ciudadSeleccionada); else if (nivelActual === "congregaciones") renderCiudades(); }

        function buscador() {
            const q = document.getElementById('inputBusqueda').value.toLowerCase();
            if(!q) { renderCiudades(); return; }
            document.getElementById('txtTitulo').innerText = "Búsqueda:";
            document.getElementById('btnVolver').style.display = 'block';
            const cont = document.getElementById('mainGrid');
            cont.className = "cards-grid";
            cont.innerHTML = "";
            const filtrados = dataLocal.filter(f => f.nombre.toLowerCase().includes(q) || f.ciudad.toLowerCase().includes(q) || f.cong.toLowerCase().includes(q));
            filtrados.forEach(f => {
                cont.innerHTML += `<div class="card"><div class="card-header"><img src="${f.foto || 'https://via.placeholder.com/60'}" class="card-img"><div><h3>${f.nombre}</h3><p style="font-size:0.8rem; color:var(--azul-claro);">${f.ciudad} | ${f.cong}</p></div></div><button class="btn-view" onclick="verCV('${f.id_cloud}')">VER PERFIL</button></div>`;
            });
        }

        function abrirEditor(id = null) {
            idEdicion = id;
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'none';
            document.getElementById('vistaEditor').style.display = 'block';
            if(id) {
                document.getElementById('editorTitulo').innerText = "Editar Registro";
                const f = dataLocal.find(x => x.id_cloud === id);
                document.getElementById('inNom').value = f.nombre; document.getElementById('inPais').value = f.pais || "Paraguay"; document.getElementById('inCiu').value = f.ciudad; document.getElementById('inCong').value = f.cong; document.getElementById('inFisc').value = f.fisc; document.getElementById('inTel').value = f.tel; document.getElementById('inEdad').value = f.edad; document.getElementById('inCiv').value = f.civ; document.getElementById('inAnos').value = f.anos; document.getElementById('inHist').value = f.hist; document.getElementById('inEsp').value = f.esp; document.getElementById('inMat').value = f.mat; document.getElementById('inEst').value = f.est;
                tmpFoto = f.foto || ""; document.getElementById('prevImg').src = f.foto || "https://via.placeholder.com/90";
            } else {
                document.getElementById('editorTitulo').innerText = "Nuevo Registro";
                document.querySelectorAll('#vistaEditor input, #vistaEditor textarea').forEach(i => i.value = "");
                document.getElementById('inPais').value = "Paraguay"; tmpFoto = ""; document.getElementById('prevImg').src = "https://via.placeholder.com/90";
            }
        }

        function procesarFoto(input) { if (input.files && input.files[0]) { let reader = new FileReader(); reader.onload = e => { tmpFoto = e.target.result; document.getElementById('prevImg').src = tmpFoto; }; reader.readAsDataURL(input.files[0]); } }

        async function guardar() {
            const btn = document.getElementById('btnGuardar'); btn.innerText = "PROCESANDO..."; btn.disabled = true;
            const registro = { nombre: document.getElementById('inNom').value, pais: document.getElementById('inPais').value, ciudad: document.getElementById('inCiu').value, cong: document.getElementById('inCong').value, fisc: document.getElementById('inFisc').value, tel: document.getElementById('inTel').value, edad: document.getElementById('inEdad').value, civ: document.getElementById('inCiv').value, anos: document.getElementById('inAnos').value, hist: document.getElementById('inHist').value, esp: document.getElementById('inEsp').value, mat: document.getElementById('inMat').value, est: document.getElementById('inEst').value, foto: tmpFoto, fecha: new Date().getTime() };
            try {
                if(idEdicion) { await dbCloud.collection("curriculums").doc(idEdicion).update(registro); } else { await dbCloud.collection("curriculums").add(registro); }
                btn.disabled = false; irDashboard();
            } catch (e) { alert("Error: " + e); btn.disabled = false; }
        }

        function verCV(idCloud) {
            const f = dataLocal.find(x => x.id_cloud === idCloud);
            const bandera = banderas[f.pais || "Otro"] || "🌍";
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'block';
            document.getElementById('cvDetalle').innerHTML = `
                <button class="btn-edit-cv" onclick="abrirEditor('${f.id_cloud}')">✏️ EDITAR</button>
                <div class="cv-aside">
                    <img src="${f.foto || 'https://via.placeholder.com/150'}" class="cv-photo">
                    <h3 class="cv-title">CONTACTO</h3>
                    <p>📱 ${f.tel}</p>
                    <p>${bandera} ${f.pais || 'Paraguay'}</p>
                    <p>📍 ${f.ciudad}</p>
                    <p>⛪ ${f.cong}</p>
                    <h3 class="cv-title">DATOS</h3>
                    <p>🎂 Edad: ${f.edad} años</p>
                    <p>💍 Estado: ${f.civ}</p>
                </div>
                <div class="cv-main">
                    <h1>${f.nombre}</h1>
                    <p style="color:var(--azul-claro); font-weight:bold; text-transform:uppercase; margin-top:5px;">${f.fisc}</p>
                    <h3 style="margin-top:35px; border-bottom: 2px solid var(--bg-gris); padding-bottom:10px;">Historial de Vida</h3>
                    <p style="margin-top:15px; line-height:1.6; color:#555; white-space: pre-line;">${f.hist}</p>
                    <div style="margin-top:35px;">
                        <div class="cv-bullet"><strong>Ocupación Espiritual:</strong> ${f.esp}</div>
                        <div class="cv-bullet"><strong>Ocupación Material:</strong> ${f.mat}</div>
                        <div class="cv-bullet"><strong>Años Perseverancia:</strong> ${f.anos}</div>
                        <div class="cv-bullet"><strong>Estado Actual:</strong> ${f.est}</div>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
