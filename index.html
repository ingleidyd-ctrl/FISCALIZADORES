<!DOCTYPE html>
<html lang="es">
<head> 
    <link rel="manifest" href="manifest.json?v=101">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/739/739247.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/739/739247.png">
    
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA FISCALIZADORES - ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-header: #0a1f33;
            --azul-claro: #11a0c8;
            --bg-gris: #f4f7fa;
            --texto: #334155;
            --flecha: #4a6fa5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-gris); color: var(--texto); }

        header { 
            background: var(--azul-header); 
            color: white; 
            padding: 15px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 { font-size: 1.4rem; letter-spacing: 2px; font-weight: 800; color: var(--azul-claro); }
        .header-subtext { font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; }

        .search-section {
            background: white;
            padding: 20px 40px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .search-input { 
            flex-grow: 1;
            padding: 12px 20px; 
            border-radius: 10px; 
            border: 1px solid #cbd5e1; 
            outline: none;
        }
        .btn-new {
            background: var(--azul-claro);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .container { padding: 30px 40px; }
        
        .grid-folder { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .folder-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .folder-card:hover { border-color: var(--azul-claro); transform: translateY(-5px); }
        .folder-icon { font-size: 3rem; margin-bottom: 15px; display: block; }
        .folder-badge { background: #f0f9ff; color: var(--azul-claro); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-top: 10px; display: inline-block; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { 
            background: white; border-radius: 15px; padding: 20px; 
            border: 1px solid #e2e8f0; position: relative;
        }
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .card-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--azul-claro); }
        .btn-view { width: 100%; padding: 10px; background: #f0f9ff; border: none; border-radius: 8px; color: var(--azul-claro); font-weight: 700; cursor: pointer; }

        #vistaCV { display: none; padding: 20px; }
        .cv-sheet { max-width: 900px; margin: 0 auto; background: white; display: flex; flex-wrap: wrap; border-radius: 8px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .cv-aside { width: 35%; background: var(--azul-header); color: white; padding: 40px 30px; min-width: 280px; }
        .cv-main { width: 65%; padding: 50px; min-width: 320px; }
        .cv-photo { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--azul-claro); object-fit: cover; margin-bottom: 25px; }
        .cv-title { color: var(--azul-claro); text-transform: uppercase; font-size: 0.8rem; margin: 25px 0 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .cv-bullet { position: relative; padding-left: 30px; margin-bottom: 15px; }
        .cv-bullet::before { content: ''; position: absolute; left: 0; top: 4px; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-left: 12px solid var(--flecha); }

        #vistaEditor { display: none; padding: 40px; }
        .editor-box { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .preview-area { grid-column: span 2; display: flex; align-items: center; gap: 20px; background: #f8fafc; padding: 15px; border-radius: 10px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; outline: none; }
    </style>
</head>
<body>

    <div id="vistaDashboard">
        <header>
            <h1>FISCALIZADORES</h1>
            <div class="header-subtext">CONGREGACIÓN CRISTIANA PUEBLO DE DIOS 🕊️</div>
        </header>

        <div class="search-section">
            <input type="text" id="inputBusqueda" class="search-input" placeholder="🔍 Buscar por nombre, ciudad o filial..." onkeyup="buscador()">
            <button class="btn-new" onclick="abrirEditor()">+ REGISTRAR NUEVO</button>
        </div>

        <div class="container">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px;">
                <h2 id="txtTitulo">CIUDADES:</h2>
                <button id="btnVolver" onclick="volverAtras()" style="display:none; background:none; border:none; color:var(--azul-claro); cursor:pointer; font-weight:bold;">← Volver</button>
            </div>
            <div id="mainGrid" class="grid-folder"></div>
        </div>
    </div>

    <div id="vistaCV">
        <button onclick="irDashboard()" style="margin:20px; cursor:pointer; background:none; border:none; color:var(--azul-claro); font-weight:bold;">← VOLVER</button>
        <div id="cvDetalle" class="cv-sheet"></div>
    </div>

    <div id="vistaEditor">
        <div class="editor-box">
            <h2>Nuevo Registro</h2>
            <div class="form-grid" style="margin-top:20px;">
                <div class="preview-area">
                    <img id="prevImg" src="https://via.placeholder.com/90" style="width:90px; height:90px; border-radius:50%; object-fit:cover;">
                    <input type="file" onchange="procesarFoto(this)">
                </div>
                <div style="grid-column: span 2;"><label>Nombre Completo</label><input type="text" id="inNom"></div>
                <div><label>Ciudad</label><input type="text" id="inCiu"></div>
                <div><label>Filial (Congregación)</label><input type="text" id="inCong"></div>
                <div style="grid-column: span 2;"><label>Fiscalizador (Especifique función)</label><input type="text" id="inFisc"></div>
                <div><label>WhatsApp</label><input type="text" id="inTel"></div>
                <div><label>Edad</label><input type="number" id="inEdad"></div>
                <div><label>Estado Civil</label><input type="text" id="inCiv"></div>
                <div><label>Años Perseverancia</label><input type="text" id="inAnos"></div>
                <div style="grid-column: span 2;"><label>Historial de Vida</label><textarea id="inHist" rows="4"></textarea></div>
                <div><label>Ocupación Espiritual</label><input type="text" id="inEsp"></div>
                <div><label>Ocupación Material</label><input type="text" id="inMat"></div>
                <div style="grid-column: span 2;"><label>Estado Actual</label><input type="text" id="inEst"></div>
                <button class="btn-new" style="grid-column: span 2;" onclick="guardar()">GUARDAR REGISTRO</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('fisc_vFinal')) || [];
        let tmpFoto = "";
        let nivelActual = "ciudades";
        let ciudadSeleccionada = "";

        function irDashboard() {
            document.getElementById('vistaDashboard').style.display = 'block';
            document.getElementById('vistaCV').style.display = 'none';
            document.getElementById('vistaEditor').style.display = 'none';
            renderCiudades();
        }

        function renderCiudades() {
            nivelActual = "ciudades";
            document.getElementById('txtTitulo').innerText = "CIUDADES:";
            document.getElementById('btnVolver').style.display = 'none';
            const cont = document.getElementById('mainGrid');
            cont.className = "grid-folder";
            cont.innerHTML = "";

            const ciudades = [...new Set(db.map(f => f.ciudad))];
            ciudades.forEach(ciu => {
                const cant = db.filter(f => f.ciudad === ciu).length;
                cont.innerHTML += `
                    <div class="folder-card" onclick="verCongregaciones('${ciu}')">
                        <span class="folder-icon">📍</span>
                        <h3>${ciu}</h3>
                        <span class="folder-badge">${cant} Fiscalizadores</span>
                    </div>`;
            });
        }

        function verCongregaciones(ciu) {
            nivelActual = "congregaciones";
            ciudadSeleccionada = ciu;
            document.getElementById('txtTitulo').innerText = "Ciudad: " + ciu;
            document.getElementById('btnVolver').style.display = 'block';
            const cont = document.getElementById('mainGrid');
            cont.className = "grid-folder";
            cont.innerHTML = "";

            const congs = [...new Set(db.filter(f => f.ciudad === ciu).map(f => f.cong))];
            congs.forEach(con => {
                const cant = db.filter(f => f.ciudad === ciu && f.cong === con).length;
                cont.innerHTML += `
                    <div class="folder-card" onclick="verFiscalizadores('${ciu}', '${con}')">
                        <span class="folder-icon">⛪</span>
                        <h3>${con}</h3>
                        <span class="folder-badge">${cant} Miembros</span>
                    </div>`;
            });
        }

        function verFiscalizadores(ciu, con) {
            nivelActual = "fiscalizadores";
            document.getElementById('txtTitulo').innerText = "Congregación: " + con;
            const cont = document.getElementById('mainGrid');
            cont.className = "cards-grid";
            cont.innerHTML = "";

            const filtrados = db.filter(f => f.ciudad === ciu && f.cong === con);
            filtrados.forEach(f => {
                cont.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <img src="${f.foto || 'https://via.placeholder.com/60'}" class="card-img">
                            <div><h3>${f.nombre}</h3><p style="font-size:0.8rem; color:var(--azul-claro);">${f.ciudad}</p></div>
                        </div>
                        <button class="btn-view" onclick="verCV(${f.id})">VER PERFIL</button>
                    </div>`;
            });
        }

        function volverAtras() {
            if (nivelActual === "fiscalizadores") verCongregaciones(ciudadSeleccionada);
            else if (nivelActual === "congregaciones") renderCiudades();
        }

        function buscador() {
            const q = document.getElementById('inputBusqueda').value.toLowerCase();
            if(!q) { renderCiudades(); return; }
            
            document.getElementById('txtTitulo').innerText = "Resultados de búsqueda:";
            document.getElementById('btnVolver').style.display = 'block';
            const cont = document.getElementById('mainGrid');
            cont.className = "cards-grid";
            cont.innerHTML = "";
            
            const filtrados = db.filter(f => 
                f.nombre.toLowerCase().includes(q) || 
                f.ciudad.toLowerCase().includes(q) || 
                f.cong.toLowerCase().includes(q)
            );

            if(filtrados.length === 0) {
                cont.innerHTML = "<p style='grid-column: 1/-1; text-align: center; padding: 40px; color: #94a3b8;'>No se encontraron resultados.</p>";
                return;
            }

            filtrados.forEach(f => {
                cont.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <img src="${f.foto || 'https://via.placeholder.com/60'}" class="card-img">
                            <div>
                                <h3>${f.nombre}</h3>
                                <p style="font-size:0.8rem; color:var(--azul-claro);">${f.ciudad} | ${f.cong}</p>
                            </div>
                        </div>
                        <button class="btn-view" onclick="verCV(${f.id})">VER PERFIL</button>
                    </div>`;
            });
        }

        function abrirEditor() {
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaEditor').style.display = 'block';
            // Reset fields
            document.getElementById('inNom').value = "";
            document.getElementById('inCiu').value = "";
            document.getElementById('inCong').value = "";
            document.getElementById('inFisc').value = "";
            document.getElementById('inTel').value = "";
            document.getElementById('inEdad').value = "";
            document.getElementById('inCiv').value = "";
            document.getElementById('inAnos').value = "";
            document.getElementById('inHist').value = "";
            document.getElementById('inEsp').value = "";
            document.getElementById('inMat').value = "";
            document.getElementById('inEst').value = "";
            tmpFoto = "";
            document.getElementById('prevImg').src = "https://via.placeholder.com/90";
        }

        function procesarFoto(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = e => { tmpFoto = e.target.result; document.getElementById('prevImg').src = tmpFoto; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function guardar() {
            const registro = {
                id: Date.now(),
                nombre: document.getElementById('inNom').value,
                ciudad: document.getElementById('inCiu').value,
                cong: document.getElementById('inCong').value,
                fisc: document.getElementById('inFisc').value,
                tel: document.getElementById('inTel').value,
                edad: document.getElementById('inEdad').value,
                civ: document.getElementById('inCiv').value,
                anos: document.getElementById('inAnos').value,
                hist: document.getElementById('inHist').value,
                esp: document.getElementById('inEsp').value,
                mat: document.getElementById('inMat').value,
                est: document.getElementById('inEst').value,
                foto: tmpFoto
            };
            db.push(registro);
            localStorage.setItem('fisc_vFinal', JSON.stringify(db));
            irDashboard();
        }

        function verCV(id) {
            const f = db.find(x => x.id === id);
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'block';
            document.getElementById('cvDetalle').innerHTML = `
                <div class="cv-aside">
                    <img src="${f.foto || ''}" class="cv-photo">
                    <h3 class="cv-title">CONTACTO</h3>
                    <p>📱 ${f.tel}</p>
                    <p>📍 ${f.ciudad}</p>
                    <p>⛪ ${f.cong}</p>
                    <h3 class="cv-title">DATOS</h3>
                    <p>🎂 Edad: ${f.edad} años</p>
                    <p>💍 Estado: ${f.civ}</p>
                    <p>📋 Fiscalizador: ${f.fisc}</p>
                </div>
                <div class="cv-main">
                    <h1>${f.nombre}</h1>
                    <p style="color:var(--azul-claro); font-weight:bold; text-transform:uppercase; margin-bottom:5px;">Ciudad - ${f.ciudad}</p>
                    <p style="color:var(--azul-claro); font-weight:bold; text-transform:uppercase;">Congregación - ${f.cong}</p>
                    
                    <h3 style="margin-top:40px;">Historial de Vida</h3>
                    <p style="margin-top:10px; line-height:1.6; color:#555; white-space: pre-line;">${f.hist}</p>
                    
                    <div style="margin-top:40px;">
                        <div class="cv-bullet"><strong>Ocupación Espiritual:</strong> ${f.esp}</div>
                        <div class="cv-bullet"><strong>Ocupación Material:</strong> ${f.mat}</div>
                        <div class="cv-bullet"><strong>Años Perseverancia:</strong> ${f.anos}</div>
                        <div class="cv-bullet"><strong>Estado Actual:</strong> ${f.est}</div>
                        <div class="cv-bullet"><strong>Fiscalizador:</strong> ${f.fisc}</div>
                    </div>
                </div>`;
        }

        irDashboard();
    </script>
</body>
</html>
