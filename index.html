<!DOCTYPE html>
<html lang="es">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA FISCALIZADORES</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --texto: #f8fafc;
            --texto-sec: #94a3b8; --accent: #38bdf8; --borde: #334155;
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --card: #ffffff; --texto: #1e293b;
            --texto-sec: #64748b; --accent: #0284c7; --borde: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg); color: var(--texto); line-height: 1.6; }

        header { background: var(--card); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--borde); position: sticky; top: 0; z-index: 1000; }
        .theme-toggle { background: var(--bg); border: 1px solid var(--borde); color: var(--texto); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: 600; }

        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }

        .grid-main { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px 40px; }
        
        .card-folder { background: var(--card); padding: 25px; border-radius: 18px; border: 1px solid var(--borde); text-align: center; cursor: pointer; position: relative; }
        .folder-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); margin-bottom: 15px; }
        
        .cv-container { max-width: 800px; margin: 20px auto; background: var(--card); border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .cv-banner { background: #000; padding: 40px 20px; text-align: center; color: white; position: relative; }
        .cv-photo { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--accent); object-fit: cover; margin-bottom: 20px; cursor: pointer; }
        .cv-name { font-size: 2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .cv-sub { color: var(--accent); font-weight: 600; margin-top: 5px; display: flex; justify-content: center; gap: 10px; align-items: center; }

        .cv-content { display: grid; grid-template-columns: 1fr 1.5fr; gap: 0; }
        .cv-left { background: rgba(0,0,0,0.1); padding: 40px; border-right: 1px solid var(--borde); display: flex; flex-direction: column; }
        .cv-right { padding: 40px; }

        .section-label { font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 20px; display: block; border-bottom: 1px solid var(--borde); padding-bottom: 5px; }
        .info-group { margin-bottom: 20px; }
        .info-label { font-size: 0.85rem; color: var(--texto-sec); display: block; }
        .info-value { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        
        .historial-box { white-space: pre-line; color: var(--texto-sec); font-size: 1rem; }

        #vistaDashboard, #vistaCV, #vistaEditor { display: none; }
    </style>
</head>
<body>

    <header>
        <h2 style="font-weight: 800; cursor: pointer;" onclick="location.reload()">FISCALIZADORES<span style="color:var(--accent)">.</span></h2>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Modo Oscuro</button>
    </header>

    <div id="vistaCV">
        <div style="padding: 20px 40px;"><button class="btn-outline" onclick="irDashboard()">← VOLVER AL LISTADO</button></div>
        <div id="cvContent" class="cv-container"></div>
    </div>

    <script>
        // ... (Configuración de Firebase y funciones lógicas de fecha se mantienen igual) ...

        function verCV(id) {
            const m = miembros.find(x => x.id === id);
            const edadAuto = calcularEdad(m.fechaNac);
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'block';
            
            document.getElementById('cvContent').innerHTML = `
                <div class="cv-banner">
                    <img src="${m.foto || ''}" class="cv-photo">
                    <div class="cv-name">${m.nombre}</div>
                    <div class="cv-sub">📍 ${m.ciudad} | ⛪ ${m.cong}</div>
                </div>
                <div class="cv-content">
                    <div class="cv-left">
                        <span class="section-label">Contacto y Datos</span>
                        <div class="info-group"><span class="info-label">📱 WhatsApp</span><span class="info-value">${m.tel || '---'}</span></div>
                        <div class="info-group"><span class="info-label">🆔 Documento</span><span class="info-value">${m.doc || '---'}</span></div>
                        <div class="info-group"><span class="info-label">🎂 Edad</span><span class="info-value">${edadAuto} años</span></div>
                        <div class="info-group"><span class="info-label">💍 Estado</span><span class="info-value">${m.estCiv || '---'}</span></div>
                        
                        <div style="margin-top: auto; padding-top: 30px;">
                            <button class="btn-primary" style="width:100%;" onclick="abrirEditor('${m.id}')">MODIFICAR REGISTRO</button>
                        </div>
                    </div>
                    <div class="cv-right">
                        <span class="section-label">Información Espiritual</span>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:30px;">
                            <div class="info-group"><span class="info-label">▶ Ocupación Espiritual</span><span class="info-value">${m.ocuEsp || '---'}</span></div>
                            <div class="info-group"><span class="info-label">▶ Ocupación Material</span><span class="info-value">${m.ocuMat || '---'}</span></div>
                            <div class="info-group"><span class="info-label">▶ Perseverancia</span><span class="info-value">${m.anos || '0'} años</span></div>
                            <div class="info-group"><span class="info-label">▶ Estado Actual</span><span class="info-value">${m.estAct || '---'}</span></div>
                        </div>
                        <div class="info-group" style="background:rgba(56,189,248,0.1); padding:15px; border-radius:10px;">
                            <span class="info-label">📋 Fiscalizador de:</span><span class="info-value">${m.fisc || '---'}</span>
                        </div>
                        <span class="section-label" style="margin-top:30px;">Historial de Vida</span>
                        <div class="historial-box">${m.hist || 'Sin historial registrado.'}</div>
                    </div>
                </div>`;
        }

        // ... (Resto de las funciones de guardado y navegación) ...
    </script>
</body>
</html>
