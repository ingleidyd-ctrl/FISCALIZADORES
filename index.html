<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISCALIZADORES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .dark-mode { background-color: #0f172a; color: #f8fafc; }
        .card { transition: transform 0.2s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-50 text-slate-900" id="body">

    <header class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <h1 class="text-2xl font-bold tracking-tight">FISCALIZADORES<span class="text-blue-500">.</span></h1>
        <button onclick="toggleDarkMode()" id="darkModeBtn" class="bg-slate-200 dark:bg-slate-800 px-4 py-2 rounded-full text-sm font-medium flex items-center gap-2">
            <span id="modeIcon">🌙</span> <span id="modeText">Modo Oscuro</span>
        </button>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="mb-8 flex flex-col md:flex-row gap-4">
            <input type="text" id="searchInput" placeholder="Buscar por nombre, ciudad o congregación..." 
                class="w-full p-4 rounded-xl border border-gray-200 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-blue-500 outline-none">
            <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-4 rounded-xl font-bold flex items-center justify-center gap-2 whitespace-nowrap">
                <i class="fas fa-plus"></i> NUEVO REGISTRO
            </button>
        </div>

        <div id="contentSection">
            <h2 class="text-xl font-bold mb-6" id="sectionTitle">Listado de Ciudades</h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6" id="gridDisplay">
                <div class="card bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-sm border border-gray-100 dark:border-slate-700 text-center" onclick="showCongregations('Asuncion')">
                    <div class="text-4xl mb-4 text-rose-500"><i class="fas fa-map-marker-alt"></i></div>
                    <h3 class="text-xl font-bold">Asuncion</h3>
                </div>
                
                <div class="card bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-sm border border-gray-100 dark:border-slate-700 text-center" onclick="showCongregations('Santa Fe')">
                    <div class="text-4xl mb-4 text-rose-500"><i class="fas fa-map-marker-alt"></i></div>
                    <h3 class="text-xl font-bold">Santa Fe</h3>
                </div>

                <div class="card bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-sm border border-gray-100 dark:border-slate-700 text-center" onclick="showCongregations('Caaguazú')">
                    <div class="text-4xl mb-4 text-rose-500"><i class="fas fa-map-marker-alt"></i></div>
                    <h3 class="text-xl font-bold">Caaguazú</h3>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleDarkMode() {
            const body = document.getElementById('body');
            const btnText = document.getElementById('modeText');
            const btnIcon = document.getElementById('modeIcon');
            
            body.classList.toggle('dark-mode');
            
            if(body.classList.contains('dark-mode')) {
                btnText.innerText = "Modo Claro";
                btnIcon.innerText = "☀️";
            } else {
                btnText.innerText = "Modo Oscuro";
                btnIcon.innerText = "🌙";
            }
        }

        // Aquí irán las funciones para navegar entre ciudades, congregaciones y perfiles
        function showCongregations(ciudad) {
            console.log("Cargando congregaciones de: " + ciudad);
            // Lógica para cambiar el contenido de 'gridDisplay'
        }
    </script>
</body>
</html>
