<!DOCTYPE html>
<html lang="es">
<head> 
    <link rel="manifest" href="manifest.json?v=106">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA FISCALIZADORES</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --azul-header: #050a14;
            --azul-claro: #4dc3e6;
            --bg-gris: #121212;
            --texto: #e2e8f0;
            --flecha: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-gris); color: var(--texto); }

        /* LOGIN */
        #vistaLogin { height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
        .login-box { background: #1a1a1a; padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #444; background: #222; color: white; border-radius: 8px; }

        /* DASHBOARD */
        header { background: #000; color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--azul-claro); }
        .search-section { background: #1a1a1a; padding: 20px 40px; display: flex; gap: 20px; align-items: center; }
        .search-input { flex-grow: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: white; }
        .btn-new { background: var(--azul-claro); color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 800; cursor: pointer; }

        .container { padding: 30px 40px; }
        .grid-folder, .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .folder-card, .card { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; text-align: center; cursor: pointer; }
        .card-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--azul-claro); }

        /* VISTA CV ESTILO IMAGEN */
        .cv-sheet { max-width: 500px; margin: 20px auto; background: #1a1a1a; min-height: 100vh; box-shadow: 0 0 30px rgba(0,0,0,0.5); position: relative; }
        .cv-aside { background: #050a14; padding: 40px 30px; text-align: left; }
        .cv-photo { width: 180px; height: 180px; border-radius: 50%; border: 3px solid var(--azul-claro); object-fit: cover; display: block; margin: 0 auto 30px; cursor: zoom-in; }
        .cv-section-title { color: var(--azul-claro); font-size: 0.8rem; font-weight: 800; border-bottom: 1px solid #1e293b; padding-bottom: 5px; margin: 20px 0 15px; letter-spacing: 1px; }
        .cv-aside p { font-size: 0.95rem; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; color: #cbd5e1; }

        .cv-main { padding: 40px 30px; background: #1a1a1a; }
        .cv-name { font-size: 2.2rem; font-weight: 800; line-height: 1.1; margin-bottom: 10px; color: #fff; }
        .cv-sub { color: var(--azul-claro); font-weight: 800; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 5px; }
        .cv-hist-title { font-size: 1.2rem; font-weight: 700; margin: 35px 0 15px; color: #fff; }
        .cv-bullet { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 20px; }
        .cv-bullet-icon { color: var(--flecha); font-size: 1.2rem; }
        .cv-bullet-text b { display: block; color: #fff; font-size: 1rem; margin-bottom: 2px; }
        .cv-bullet-text span { color: #94a3b8; font-size: 0.95rem; }

        /* EDITOR */
        .editor-box { max-width: 600px; margin: 0 auto; background: #1a1a1a; padding: 30px; border-radius: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea, select { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; width: 100%; margin-top: 5px; }

        #modalFoto { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        
        #vistaDashboard, #vistaCV, #vistaEditor { display: none; }
    </style>
</head>
<body>

    <div id="modalFoto" onclick="this.style.display='none'"><img id="fotoAgrandada" style="max-width:90%; border:3px solid white;"></div>

    <div id="vistaLogin">
        <div class="login-box">
            <h2 style="margin-bottom: 20px; color: var(--azul-claro);">FISCALIZADORES 🕊️</h2>
            <input type="text" id="userInput" placeholder="Usuario">
            <input type="password" id="passInput" placeholder="Contraseña">
            <button class="btn-new" style="width:100%" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <div id="vistaDashboard">
        <header>
            <h1>FISCALIZADORES</h1>
            <button onclick="logout()" style="background:none; border:1px solid white; color:white; padding:5px; cursor:pointer; font-size:0.7rem;">Salir</button>
        </header>
        <div class="search-section">
            <input type="text" id="inputBusqueda" class="search-input" placeholder="🔍 Buscar..." onkeyup="buscador()">
            <button class="btn-new" onclick="abrirEditor()">+ NUEVO</button>
        </div>
        <div class="container">
            <h2 id="txtTitulo" style="margin-bottom:20px;">CIUDADES:</h2>
            <button id="btnVolver" onclick="volverAtras()" style="display:none; color:var(--azul-claro); background:none; border:none; cursor:pointer; margin-bottom:15px;">← VOLVER</button>
            <div id="mainGrid" class="grid-folder"></div>
        </div>
    </div>

    <div id="vistaCV">
        <div id="cvDetalle" class="cv-sheet"></div>
    </div>

    <div id="vistaEditor">
        <div class="editor-box">
            <h2 id="editorTitulo" style="color:var(--azul-claro)">Nuevo Registro</h2>
            <div class="form-grid" style="margin-top:20px;">
                <div style="grid-column: span 2; text-align: center;">
                    <img id="prevImg" src="https://via.placeholder.com/90" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid var(--azul-claro);">
                    <input type="file" onchange="procesarFoto(this)" style="margin-top:10px;">
                </div>
                <div style="grid-column: span 2;"><label>Nombre Completo</label><input type="text" id="inNom"></div>
                <div><label>Ciudad</label><input type="text" id="inCiu"></div>
                <div><label>Filial (Congregación)</label><input type="text" id="inCong"></div>
                <div><label>WhatsApp</label><input type="text" id="inTel"></div>
                <div><label>Edad</label><input type="text" id="inEdad"></div>
                <div><label>Estado Civil</label><input type="text" id="inEstCiv" placeholder="Ej: Soltera"></div>
                <div><label>Fiscalizador de:</label><input type="text" id="inFiscTipo" placeholder="Ej: De solteros"></div>
                <div><label>Ocupación Espiritual</label><input type="text" id="inOcuEsp"></div>
                <div><label>Ocupación Material</label><input type="text" id="inOcuMat"></div>
                <div><label>Años Perseverancia</label><input type="text" id="inAnosP"></div>
                <div><label>Estado Actual</label><input type="text" id="inEstAct" placeholder="Ej: Unificada"></div>
                <div style="grid-column: span 2;"><label>Historial de Vida</label><textarea id="inHist" rows="3"></textarea></div>
                <button id="btnGuardar" class="btn-new" style="grid-column: span 2;" onclick="guardar()">GUARDAR</button>
                <button onclick="irDashboard()" style="grid-column: span 2; background:none; color:white; border:none; cursor:pointer;">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBkP6NALOTSHGd4QVgAxHyeJzCCnOUDY6M",
          authDomain: "fiscalizadores-elite.firebaseapp.com",
          projectId: "fiscalizadores-elite",
          storageBucket: "fiscalizadores-elite.firebasestorage.app",
          messagingSenderId: "482161512140",
          appId: "1:482161512140:web:95dd229a858ab627a03c69"
        };
        firebase.initializeApp(firebaseConfig);
        const dbCloud = firebase.firestore();

        let dataLocal = [];
        let tmpFoto = "";
        let nivelActual = "ciudades";
        let ciudadSeleccionada = "";
        let idEdicion = null;

        function login() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            if(u === "admin" && p === "crist2026") { 
                document.getElementById('vistaLogin').style.display = 'none';
                irDashboard();
            } else { alert("Error"); }
        }

        function logout() { location.reload(); }

        function irDashboard() {
            document.getElementById('vistaDashboard').style.display = 'block';
            document.getElementById('vistaCV').style.display = 'none';
            document.getElementById('vistaEditor').style.display = 'none';
            escucharDatos();
        }

        function escucharDatos() {
            dbCloud.collection("curriculums").onSnapshot((qs) => {
                dataLocal = [];
                qs.forEach((doc) => { dataLocal.push({ id_cloud: doc.id, ...doc.data() }); });
                renderCiudades();
            });
        }

        function renderCiudades() {
            nivelActual = "ciudades";
            document.getElementById('btnVolver').style.display = 'none';
            const cont = document.getElementById('mainGrid');
            cont.innerHTML = "";
            [...new Set(dataLocal.map(f => f.ciudad))].forEach(ciu => {
                cont.innerHTML += `<div class="folder-card" onclick="verCongregaciones('${ciu}')">📍<br>${ciu}</div>`;
            });
        }

        function verCongregaciones(ciu) {
            nivelActual = "congregaciones";
            ciudadSeleccionada = ciu;
            document.getElementById('btnVolver').style.display = 'block';
            const cont = document.getElementById('mainGrid');
            cont.innerHTML = "";
            [...new Set(dataLocal.filter(f => f.ciudad === ciu).map(f => f.cong))].forEach(con => {
                cont.innerHTML += `<div class="folder-card" onclick="verFiscalizadores('${ciu}', '${con}')">⛪<br>${con}</div>`;
            });
        }

        function verFiscalizadores(ciu, con) {
            nivelActual = "fiscalizadores";
            const cont = document.getElementById('mainGrid');
            cont.innerHTML = "";
            dataLocal.filter(f => f.ciudad === ciu && f.cong === con).forEach(f => {
                cont.innerHTML += `<div class="card" onclick="verCV('${f.id_cloud}')"><img src="${f.foto || 'https://via.placeholder.com/60'}" class="card-img"><br>${f.nombre}</div>`;
            });
        }

        function volverAtras() {
            if (nivelActual === "fiscalizadores") verCongregaciones(ciudadSeleccionada);
            else renderCiudades();
        }

        function verCV(idCloud) {
            const f = dataLocal.find(x => x.id_cloud === idCloud);
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'block';
            document.getElementById('cvDetalle').innerHTML = `
                <div class="cv-aside">
                    <button onclick="irDashboard()" style="background:none; border:none; color:white; cursor:pointer; margin-bottom:20px;">← ATRÁS</button>
                    <img src="${f.foto || 'https://via.placeholder.com/150'}" class="cv-photo" onclick="document.getElementById('fotoAgrandada').src=this.src; document.getElementById('modalFoto').style.display='flex'">
                    
                    <div class="cv-section-title">CONTACTO</div>
                    <p>📱 ${f.tel || 'S/N'}</p>
                    <p>📍 ${f.ciudad}</p>
                    <p>⛪ ${f.cong}</p>

                    <div class="cv-section-title">DATOS</div>
                    <p>🎂 Edad: ${f.edad || '---'}</p>
                    <p>💍 Estado: ${f.estCiv || '---'}</p>
                    <p>📋 Fiscalizador: ${f.fiscTipo || '---'}</p>
                    <button onclick="abrirEditor('${f.id_cloud}')" style="margin-top:20px; background:none; border:1px solid #333; color:gray; font-size:0.6rem; cursor:pointer;">EDITAR DATOS</button>
                </div>
                <div class="cv-main">
                    <div class="cv-name">${f.nombre.split(' ').join('<br>')}</div>
                    <div class="cv-sub">CIUDAD - ${f.ciudad.toUpperCase()}</div>
                    <div class="cv-sub">CONGREGACIÓN - ${f.cong.toUpperCase()}</div>

                    <div class="cv-hist-title">Historial de Vida</div>
                    <p style="color:#94a3b8; font-size:0.95rem; line-height:1.4;">${f.hist || '---'}</p>

                    <div style="margin-top:40px;">
                        <div class="cv-bullet">
                            <div class="cv-bullet-icon">▶</div>
                            <div class="cv-bullet-text"><b>Ocupación Espiritual:</b><span>${f.ocuEsp || '---'}</span></div>
                        </div>
                        <div class="cv-bullet">
                            <div class="cv-bullet-icon">▶</div>
                            <div class="cv-bullet-text"><b>Ocupación Material:</b><span>${f.ocuMat || '---'}</span></div>
                        </div>
                        <div class="cv-bullet">
                            <div class="cv-bullet-icon">▶</div>
                            <div class="cv-bullet-text"><b>Años Perseverancia:</b><span>${f.anosP || '---'}</span></div>
                        </div>
                        <div class="cv-bullet">
                            <div class="cv-bullet-icon">▶</div>
                            <div class="cv-bullet-text"><b>Estado Actual:</b><span>${f.estAct || '---'}</span></div>
                        </div>
                        <div class="cv-bullet">
                            <div class="cv-bullet-icon">▶</div>
                            <div class="cv-bullet-text"><b>Fiscalizador:</b><span>${f.fiscTipo || '---'}</span></div>
                        </div>
                    </div>
                </div>`;
        }

        function abrirEditor(id = null) {
            idEdicion = id;
            document.getElementById('vistaDashboard').style.display = 'none';
            document.getElementById('vistaCV').style.display = 'none';
            document.getElementById('vistaEditor').style.display = 'block';
            if(id) {
                const f = dataLocal.find(x => x.id_cloud === id);
                document.getElementById('inNom').value = f.nombre;
                document.getElementById('inCiu').value = f.ciudad;
                document.getElementById('inCong').value = f.cong;
                document.getElementById('inTel').value = f.tel;
                document.getElementById('inEdad').value = f.edad || "";
                document.getElementById('inEstCiv').value = f.estCiv || "";
                document.getElementById('inFiscTipo').value = f.fiscTipo || "";
                document.getElementById('inOcuEsp').value = f.ocuEsp || "";
                document.getElementById('inOcuMat').value = f.ocuMat || "";
                document.getElementById('inAnosP').value = f.anosP || "";
                document.getElementById('inEstAct').value = f.estAct || "";
                document.getElementById('inHist').value = f.hist || "";
                tmpFoto = f.foto || "";
                document.getElementById('prevImg').src = f.foto || "https://via.placeholder.com/90";
            }
        }

        function procesarFoto(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = e => { tmpFoto = e.target.result; document.getElementById('prevImg').src = tmpFoto; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function guardar() {
            const registro = {
                nombre: document.getElementById('inNom').value,
                ciudad: document.getElementById('inCiu').value,
                cong: document.getElementById('inCong').value,
                tel: document.getElementById('inTel').value,
                edad: document.getElementById('inEdad').value,
                estCiv: document.getElementById('inEstCiv').value,
                fiscTipo: document.getElementById('inFiscTipo').value,
                ocuEsp: document.getElementById('inOcuEsp').value,
                ocuMat: document.getElementById('inOcuMat').value,
                anosP: document.getElementById('inAnosP').value,
                estAct: document.getElementById('inEstAct').value,
                hist: document.getElementById('inHist').value,
                foto: tmpFoto,
                fecha: new Date().getTime()
            };
            if(idEdicion) await dbCloud.collection("curriculums").doc(idEdicion).update(registro);
            else await dbCloud.collection("curriculums").add(registro);
            irDashboard();
        }
    </script>
</body>
</html>
